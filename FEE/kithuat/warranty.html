<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảo hành – Kỹ thuật GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .wr-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .wr-card .head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .wr-card .info-row{font-size:13.5px;color:#475569;margin-bottom:4px}
  .wr-card .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .wr-photo img{display:block;max-width:140px;max-height:110px;object-fit:cover;border:1px solid var(--border);border-radius:6px}
  .pill.purple{background:#ede9fe;color:#6d28d9}
  .pill.cyan{background:#cffafe;color:#155e75}
  .pill.orange{background:#ffedd5;color:#9a3412}
  .empty-state{padding:40px 20px;text-align:center;color:#64748b}
  .empty-state .ic{font-size:48px;margin-bottom:8px}
  .filter-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:12px}
  .photo-preview{margin:8px 0}
  .photo-preview img{max-width:200px;max-height:160px;border:1px solid var(--border);border-radius:6px}
  .upload-btn{display:block;padding:14px;background:#f1f5f9;border:2px dashed var(--border);border-radius:6px;text-align:center;cursor:pointer;color:var(--muted)}
  .upload-btn:hover{background:#e0f2fe;border-color:var(--primary);color:var(--primary)}
  .item-line{display:grid;grid-template-columns:1.5fr 1fr 60px 1fr 30px;gap:6px;align-items:center;margin-bottom:6px}
  .item-line input{padding:6px}
  .items-section{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border)}
  .items-section h4{margin:0 0 6px;font-size:13.5px;color:#475569}
  .wr-items-view{margin-top:10px;border-top:1px dashed var(--border);padding-top:8px}
  .wr-items-view .ig{margin-bottom:6px;font-size:13px}
  .wr-items-view .ig .lbl{font-size:12px;color:#64748b;margin-bottom:2px}
  .wr-items-view .ig .it{padding-left:10px}
  .wr-items-view .ig .it .imei{font-family:monospace;font-size:11.5px;color:#64748b}
  .complete-grid{display:grid;grid-template-columns:120px 1fr;gap:8px 10px;align-items:center;margin-bottom:6px}
  .complete-grid input,.complete-grid select{width:100%}
  .complete-warn{padding:8px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:13px;margin-top:6px;display:none}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Bảo hành</h2>
      <div id="topnav-user" class="row" style="gap:10px"></div>
    </div>
    <div class="content">
      <div class="filter-row">
        <input type="search" id="fSearch" class="input" placeholder="🔍 Tìm theo mã / biển số / khách…">
        <select id="fStatus" class="select">
          <option value="">Tất cả trạng thái</option>
          <option value="received">Cần thu hồi</option>
          <option value="recovered">Đã thu hồi</option>
          <option value="awaiting_warranty">Đang chờ BH</option>
          <option value="warranty_done">Đã BH xong</option>
          <option value="delivering">Đang trả khách</option>
          <option value="completed">Hoàn tất</option>
        </select>
        <button type="button" class="btn ghost" id="btnRefresh">↻ Làm mới</button>
      </div>
      <div id="list"></div>
    </div>
  </main>
</div>

<!-- Modal upload anh thu hoi + items nhan tu khach -->
<div id="recoverModal" class="modal-bg">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h3>Chụp ảnh thu hồi</h3>
      <button type="button" class="modal-close" id="recoverClose" aria-label="Đóng">×</button>
    </div>
    <div class="modal-body">
      <p class="help">Chụp ảnh xác nhận đã thu hồi thiết bị từ khách. Ảnh sẽ lưu cùng đơn bảo hành.</p>
      <input type="file" id="recoverFile" accept="image/*" capture="environment" style="display:none">
      <label for="recoverFile" class="upload-btn" id="recoverPlaceholder">📷 Chọn ảnh hoặc chụp ảnh</label>
      <div class="photo-preview" id="recoverPreview" style="display:none"><img id="recoverImg"></div>

      <div class="items-section">
        <h4>📥 Sản phẩm nhận từ khách (tuỳ chọn)</h4>
        <div id="recoverItems"></div>
        <button type="button" class="btn ghost sm" id="addRecoverItem">+ Thêm dòng</button>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn ghost" id="recoverCancel">Hủy</button>
      <button type="button" class="btn" id="recoverSave" disabled>Xác nhận thu hồi</button>
    </div>
  </div>
</div>

<!-- Modal hoan tat (giao tra) 3 nhanh + items giao -->
<div id="completeModal" class="modal-bg">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h3>Hoàn tất giao trả</h3>
      <button type="button" class="modal-close" id="completeClose" aria-label="Đóng">×</button>
    </div>
    <div class="modal-body">
      <div class="complete-grid">
        <label>Phí BH</label><div id="cm_cost_view">0đ</div>
        <label>Đã thu trước</label><div id="cm_paid_before">0đ</div>
        <label><b>Còn lại</b></label><div><b id="cm_remaining">0đ</b></div>
      </div>
      <hr style="margin:8px 0;border:none;border-top:1px solid var(--border)">
      <div class="complete-grid">
        <label>KTV thu</label><input type="number" id="cm_to_staff" class="input" min="0" step="1000" value="0">
        <label>Phương thức</label>
        <select id="cm_to_staff_method" class="select">
          <option value="cash">Tiền mặt</option>
          <option value="transfer">Chuyển khoản</option>
        </select>
        <label>Admin nhận</label><input type="number" id="cm_to_admin" class="input" min="0" step="1000" value="0">
        <label>Khách nợ</label><input type="number" id="cm_debt" class="input" min="0" step="1000" value="0" readonly>
      </div>
      <div id="cm_warn" class="complete-warn"></div>

      <div class="items-section">
        <h4>🚚 Sản phẩm giao khách (tuỳ chọn)</h4>
        <div id="completeItems"></div>
        <button type="button" class="btn ghost sm" id="addCompleteItem">+ Thêm dòng</button>
      </div>

      <div class="field" style="margin-top:10px">
        <label>Ảnh giao trả (tuỳ chọn)</label>
        <input type="file" id="completeFile" accept="image/*" capture="environment" style="display:none">
        <label for="completeFile" class="upload-btn" id="completePlaceholder">📷 Chọn / chụp ảnh giao trả</label>
        <div class="photo-preview" id="completePreview" style="display:none"><img id="completeImg"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn ghost" id="completeCancel">Hủy</button>
      <button type="button" class="btn" id="completeSave">Hoàn tất</button>
    </div>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/imgbb.js"></script>
<script src="/shared/js/tech-shell.js"></script>
<script src="/kithuat/warranty.js"></script>
</body>
</html>
