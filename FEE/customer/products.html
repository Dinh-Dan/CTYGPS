<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sản phẩm – GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
</head>
<body>
<div class="topbar">
  <div class="container">
    <div>☎ Hotline: 1900 2045</div>
    <div id="topbarRight"></div>
  </div>
</div>
<header class="site">
  <div class="container">
    <a class="logo" href="/customer/"><span class="logo-mark">GV</span> GPS VIỆT</a>
    <button class="nav-toggle" aria-label="Mở menu" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
    <nav class="main">
      <a href="/customer/">Trang chủ</a>
      <a href="/customer/products.html" class="active">Sản phẩm</a>
      <a href="/customer/order.html">Đặt dịch vụ</a>
      <a href="/customer/compliance.html">Nghị định 10</a>
      <a href="/customer/guide.html">Hướng dẫn</a>
      <a href="/customer/about.html">Về chúng tôi</a>
    </nav>
    <div class="header-actions">
      <a class="btn ghost sm" href="/customer/orders.html">Đơn của tôi</a>
      <span data-cart-mount></span>
    </div>
  </div>
</header>

<div class="container" style="padding:30px 20px">
  <div class="spread mb-3">
    <div>
      <h1 style="margin:0">Tất cả sản phẩm</h1>
      <p class="text-muted mb-0">Thiết bị chính hãng, bảo hành dài hạn, tương thích app Fast Track GPS.</p>
    </div>
  </div>

  <div class="toolbar mb-3">
    <input id="pSearch" class="input" placeholder="🔍 Tìm tên / mã sản phẩm" style="flex:2;min-width:220px">
    <select id="pCategory" class="select" style="flex:1;min-width:160px">
      <option value="">Tất cả loại</option>
    </select>
    <select id="pSort" class="select" style="flex:1;min-width:160px">
      <option value="name">Tên A → Z</option>
      <option value="price_asc">Giá thấp → cao</option>
      <option value="price_desc">Giá cao → thấp</option>
      <option value="newest">Mới nhất</option>
    </select>
    <input id="pPriceMin" type="number" class="input" placeholder="Giá từ (đ)" min="0" step="100000" style="flex:1;min-width:120px">
    <input id="pPriceMax" type="number" class="input" placeholder="Giá đến (đ)" min="0" step="100000" style="flex:1;min-width:120px">
    <button id="pReset" class="btn ghost sm" type="button">Bỏ lọc</button>
  </div>

  <div id="pCount" class="text-muted mb-2" style="font-size:13px"></div>
  <div class="grid cols-4" id="grid"></div>
  <div class="pager mt-3">
    <button id="pPrev">« Trước</button>
    <span id="pPageInfo">Trang 1</span>
    <button id="pNext">Sau »</button>
  </div>
</div>

<footer class="site"><div class="container bottom">© 2026 GPS Việt</div></footer>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/customer-topbar.js"></script>
<script src="/shared/js/chat-with-admin.js"></script>
<script src="/shared/js/app.js"></script>
<script src="/shared/js/cart.js"></script>
<script>
  const fmt = new Intl.NumberFormat('vi-VN');
  const $ = (id) => document.getElementById(id);

  function iconFor(name) {
    const n = (name || '').toLowerCase();
    if (n.includes('định vị') || n.includes('dinh vi')) return '📍';
    if (n.includes('camera')) return '📷';
    if (n.includes('sim'))    return '📡';
    if (n.includes('phụ') || n.includes('phu kien')) return '🔧';
    return '📦';
  }

  const state = { q:'', category_id:'', price_min:'', price_max:'', sort:'name', page:1, limit:12, total:0 };

  async function loadCategories() {
    const res = await api.get('/public/categories', { silent: true }).catch(() => null);
    if (!res) return;
    const sel = $('pCategory');
    res.items.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  async function loadProducts() {
    const p = new URLSearchParams();
    Object.entries(state).forEach(([k,v]) => { if (k==='total') return; if (v!=='' && v!==0) p.set(k,v); });
    // Khach login -> /customer/products de lay gia rieng/theo cap; chua login -> /public/products.
    const endpoint = (window.auth && auth.isLoggedIn && auth.isLoggedIn())
      ? '/customer/products'
      : '/public/products';
    const res = await api.get(endpoint + '?' + p.toString(), { silent: true }).catch(() => null);
    if (!res) return;
    state.total = res.total;

    const g = $('grid');
    if (!res.items.length) {
      g.innerHTML = '<p class="text-muted text-center" style="grid-column:1/-1;padding:40px">Không có sản phẩm phù hợp</p>';
    } else {
      g.innerHTML = res.items.map(p => `
        <a class="product" href="/customer/product-detail.html?id=${p.id}">
          <div class="thumb">${p.image_url ? `<img src="${p.image_url}" alt="">` : `<span class="thumb-icon">${iconFor(p.category_name)}</span>`}</div>
          <div class="body">
            ${p.category_name ? `<span class="badge">${p.category_name}</span>` : ''}
            <h4>${p.name}</h4>
            <div class="price">${p.retail_price ? fmt.format(p.retail_price) + 'đ' : '<span style="color:#64748b;font-size:14px">Liên hệ</span>'}</div>
            <div class="meta">Mã ${p.code} • BH ${p.warranty_months || 0} tháng</div>
            <div class="actions">
              <button type="button" class="btn ghost sm">👁 Xem thêm</button>
              <button type="button" class="btn sm" data-cart-add
                data-product-id="${p.id}"
                data-code="${p.code}"
                data-name="${p.name.replaceAll('"','&quot;')}"
                data-image="${p.image_url || ''}"
                data-price="${p.retail_price || 0}">🛒 Thêm vào giỏ</button>
            </div>
          </div>
        </a>`).join('');
    }

    const totalPage = Math.max(1, Math.ceil(res.total / state.limit));
    $('pPageInfo').textContent = `Trang ${state.page} / ${totalPage}`;
    $('pPrev').disabled = state.page <= 1;
    $('pNext').disabled = state.page >= totalPage;
    $('pCount').textContent = res.total ? `Tìm thấy ${res.total} sản phẩm` : '';
  }

  let timer;
  function debounced() { clearTimeout(timer); timer = setTimeout(() => { state.page = 1; loadProducts(); }, 300); }
  $('pSearch')  .addEventListener('input',  e => { state.q = e.target.value.trim(); debounced(); });
  $('pPriceMin').addEventListener('input',  e => { state.price_min = e.target.value; debounced(); });
  $('pPriceMax').addEventListener('input',  e => { state.price_max = e.target.value; debounced(); });
  $('pCategory').addEventListener('change', e => { state.category_id = e.target.value; state.page = 1; loadProducts(); });
  $('pSort')    .addEventListener('change', e => { state.sort = e.target.value; state.page = 1; loadProducts(); });
  $('pReset').addEventListener('click', () => {
    state.q = state.category_id = state.price_min = state.price_max = ''; state.sort = 'name'; state.page = 1;
    $('pSearch').value = $('pPriceMin').value = $('pPriceMax').value = '';
    $('pCategory').value = ''; $('pSort').value = 'name';
    loadProducts();
  });
  $('pPrev').addEventListener('click', () => { state.page--; loadProducts(); });
  $('pNext').addEventListener('click', () => { state.page++; loadProducts(); });

  loadCategories();
  loadProducts();
</script>
</body>
</html>
