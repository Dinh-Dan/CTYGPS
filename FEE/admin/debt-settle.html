<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phiếu tất toán – Admin GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  body{background:#f1f5f9;margin:0}
  .bill-page{max-width:780px;margin:24px auto;padding:0}
  .bill-actions{display:flex;gap:8px;margin-bottom:14px;justify-content:flex-end}
  .bill-paper{background:#fff;padding:32px 40px;box-shadow:0 4px 16px rgba(0,0,0,.08);border-radius:6px}
  .bill-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0f172a;padding-bottom:14px;margin-bottom:18px}
  .bill-brand{display:flex;align-items:center;gap:10px}
  .bill-brand .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,#1f6feb,#2563eb);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px}
  .bill-brand .brand-name{font-size:18px;font-weight:700;color:#0f172a}
  .bill-brand .brand-sub{font-size:12px;color:#64748b}
  .bill-meta{text-align:right;font-size:13px;color:#475569}
  .bill-meta .bill-title{font-size:20px;font-weight:800;color:#1f6feb;letter-spacing:.5px;margin-bottom:4px}
  .bill-section{margin-bottom:18px}
  .bill-section h3{font-size:13px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin-bottom:8px}
  .bill-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:14px}
  .bill-info b{color:#0f172a}
  .bill-table{width:100%;border-collapse:collapse;font-size:13.5px}
  .bill-table th,.bill-table td{padding:8px 10px;border-bottom:1px solid #e2e8f0;text-align:left}
  .bill-table th{background:#f8fafc;font-weight:600;color:#475569}
  .bill-table td.num{text-align:right;font-variant-numeric:tabular-nums}
  .bill-summary{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:14px 18px;margin-top:10px}
  .bill-summary .row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
  .bill-summary .row.total{font-size:18px;font-weight:800;color:#1f6feb;padding-top:8px;border-top:1px dashed #fdba74;margin-top:6px}
  .bill-summary .row.remaining{color:#dc2626;font-weight:700}
  .bill-pay{display:grid;grid-template-columns:1fr 180px;gap:18px;align-items:center;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 18px}
  .bill-pay .pay-info{font-size:14px}
  .bill-pay .pay-info .row{padding:3px 0}
  .bill-pay .pay-info b{color:#0f172a}
  .bill-qr{text-align:center}
  .bill-qr img{width:160px;height:160px;object-fit:contain;background:#fff;border:1px solid #e2e8f0;border-radius:6px}
  .bill-qr .qr-label{font-size:12px;color:#64748b;margin-top:4px}
  .bill-footer{margin-top:24px;padding-top:14px;border-top:1px dashed #cbd5e1;display:flex;justify-content:space-between;font-size:12px;color:#64748b}
  .empty{color:#94a3b8;font-style:italic;padding:20px;text-align:center}

  @media print {
    body{background:#fff}
    .bill-page{max-width:none;margin:0;padding:0}
    .bill-actions{display:none}
    .bill-paper{box-shadow:none;padding:18px 24px;border-radius:0}
    @page{size:A4;margin:12mm}
  }
</style>
</head>
<body>
<div class="bill-page">
  <div class="bill-actions">
    <button class="btn ghost" id="btnBack">← Về Công nợ</button>
    <button class="btn" id="btnPrint">🖨 In bill</button>
  </div>
  <div class="bill-paper" id="billPaper">
    <div class="empty">Đang tải phiếu...</div>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/admin/debt-settle.js"></script>
</body>
</html>
