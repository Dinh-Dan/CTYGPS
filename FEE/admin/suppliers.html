<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nhà cung cấp – Admin GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <div class="search">🔍 <input id="search" placeholder="Tìm tên / SĐT / địa chỉ NCC..." /></div>
      <div class="row" id="topnav-user"></div>
    </div>
    <div class="content flex-page">
      <div class="page-head">
        <div>
          <h1>Nhà cung cấp</h1>
          <p class="text-muted mb-0">Quản lý danh sách nhà cung cấp thiết bị / linh kiện.</p>
        </div>
        <button class="btn" id="btnAdd">+ Thêm NCC</button>
      </div>

      <div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th style="width:80px">#</th>
              <th>Tên NCC</th>
              <th style="width:140px">SĐT</th>
              <th>Địa chỉ</th>
              <th>Ghi chú</th>
              <th style="width:140px">Hành động</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prevPage">« Trước</button>
        <span id="pageInfo">Trang 1</span>
        <button id="nextPage">Sau »</button>
      </div>
    </div>
  </main>
</div>

<div id="modal" class="modal-bg">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h3 id="modalTitle">Thêm nhà cung cấp</h3>
      <button type="button" class="modal-close" id="modalClose" aria-label="Đóng">×</button>
    </div>
    <form id="frm" style="display:contents">
      <div class="modal-body">
        <input type="hidden" id="f_id">

        <div class="field">
          <label>Tên NCC *</label>
          <input type="text" id="f_name" class="input" required placeholder="VD: Công ty TNHH An Khang">
        </div>

        <div class="grid cols-2">
          <div class="field">
            <label>SĐT</label>
            <input type="text" id="f_phone" class="input">
          </div>
          <div class="field">
            <label>Địa chỉ</label>
            <input type="text" id="f_address" class="input">
          </div>
        </div>

        <div class="field">
          <label>Ghi chú</label>
          <textarea id="f_note" class="textarea" placeholder="Loại hàng cung cấp, điều khoản thanh toán..."></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn ghost" id="btnCancel">Hủy</button>
        <button type="submit" class="btn" id="btnSave">Lưu</button>
      </div>
    </form>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="/admin/suppliers.js"></script>
</body>
</html>
