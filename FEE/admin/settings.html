<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cài đặt – Admin GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .settings-grid{display:grid;gap:18px;max-width:960px}
  .settings-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 22px}
  .settings-card h3{margin:0 0 4px;font-size:16px;color:#0f172a}
  .settings-card .help{margin:0 0 14px;font-size:13px;color:#64748b}
  .qr-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .qr-slot{border:1px solid var(--border);border-radius:10px;padding:12px;background:#f8fafc;display:flex;flex-direction:column;gap:8px}
  .qr-slot.is-default{border-color:var(--primary);background:#eff6ff}
  .qr-img-wrap{aspect-ratio:1;background:#fff;border:1px dashed #cbd5e1;border-radius:8px;display:grid;place-items:center;overflow:hidden;position:relative}
  .qr-img-wrap img{width:100%;height:100%;object-fit:contain}
  .qr-img-wrap .empty-text{color:#94a3b8;font-size:13px}
  .qr-actions{display:flex;gap:6px}
  .qr-actions .btn{flex:1;padding:6px 8px;font-size:12.5px}
  .qr-label-input{padding:6px 8px;font-size:13px;width:100%;border:1px solid var(--border);border-radius:6px}
  .qr-default-label{display:flex;gap:6px;align-items:center;font-size:12.5px;color:#1f6feb;cursor:pointer}
  .qr-default-label input{margin:0}
  .bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .save-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:12px 0;margin-top:14px;display:flex;justify-content:flex-end;gap:8px}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Cài đặt</h2>
      <div id="topnav-user" class="row" style="gap:10px"></div>
    </div>
    <div class="content">
      <div class="settings-grid">

        <div class="settings-card">
          <h3>📷 QR thanh toán</h3>
          <p class="help">5 ảnh QR có thể cập nhật riêng. Chọn 1 ảnh làm "mặc định" để tự chọn khi tạo phiếu tất toán. Ảnh upload qua imgbb (≤5MB).</p>
          <div class="qr-row" id="qrRow"></div>
        </div>

        <div class="settings-card">
          <h3>🏦 Tài khoản ngân hàng</h3>
          <p class="help">Thông tin in trên bill phiếu tất toán cùng QR.</p>
          <div class="bank-grid">
            <div class="field">
              <label>Tên ngân hàng</label>
              <input id="bkName" class="input" placeholder="VD: Vietcombank">
            </div>
            <div class="field">
              <label>Số tài khoản</label>
              <input id="bkNo" class="input" placeholder="VD: 0123456789">
            </div>
            <div class="field" style="grid-column:1/-1">
              <label>Chủ tài khoản</label>
              <input id="bkOwner" class="input" placeholder="VD: CONG TY TNHH GPS VIET">
            </div>
          </div>
        </div>

        <div class="save-bar">
          <button type="button" class="btn ghost" id="btnReset">Khôi phục</button>
          <button type="button" class="btn" id="btnSave">💾 Lưu cài đặt</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/imgbb.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="/admin/settings.js"></script>
</body>
</html>
