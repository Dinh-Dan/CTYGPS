<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hồ sơ – Kỹ thuật VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .profile-grid{display:grid;grid-template-columns:300px 1fr;gap:18px}
  @media (max-width:900px){
    .profile-grid{grid-template-columns:1fr;gap:12px}
    .grid.cols-2{grid-template-columns:1fr;gap:0}
    .profile-card{padding:16px}
    .profile-card .big-avatar{width:96px;height:96px;font-size:36px}
  }
  .profile-card{text-align:center;padding:24px}
  .profile-card .big-avatar{width:120px;height:120px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:48px;font-weight:700;margin:0 auto 12px;object-fit:cover}
  .profile-card .stars{font-size:18px;color:#f59e0b;margin:8px 0}
  .review-row{padding:10px;border-bottom:1px solid var(--border)}
  .review-row:last-child{border-bottom:none}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:18px}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Hồ sơ cá nhân</h2>
      <div id="topnav-user" class="row" style="gap:10px"></div>
    </div>
    <div class="content">
      <div class="profile-grid">
        <div>
          <div class="card profile-card">
            <div id="bigAvatar" class="big-avatar">?</div>
            <h3 id="p_name">—</h3>
            <small class="text-muted" id="p_meta">—</small>
            <div class="stars" id="p_stars">⭐ 0.0</div>
            <small class="text-muted" id="p_review_count">Chưa có đánh giá</small>
            <input type="file" id="avatarFile" accept="image/*" style="display:none">
            <button class="btn ghost sm mt-2" id="btnChangeAvatar">📷 Đổi ảnh đại diện</button>
          </div>
        </div>
        <div>
          <div class="stat-grid">
            <a class="stat" href="/kithuat/tasks.html?status=done" style="cursor:pointer;color:inherit;text-decoration:none">
              <div class="icon green">💵</div>
              <div><div class="label">Lương tháng này</div><div class="value" id="s_wage">0đ</div></div>
            </a>
            <a class="stat" href="/kithuat/tasks.html?payment=unpaid" style="cursor:pointer;color:inherit;text-decoration:none">
              <div class="icon red">⚠</div>
              <div><div class="label">Chưa nộp</div><div class="value" id="s_unpaid">0đ</div><small class="text-muted" id="s_unpaid_count">0 khoản</small></div>
            </a>
            <a class="stat" href="/kithuat/tasks.html?status=done" style="cursor:pointer;color:inherit;text-decoration:none">
              <div class="icon">✓</div>
              <div><div class="label">Tổng hoàn thành</div><div class="value" id="s_done">0</div></div>
            </a>
            <div class="stat"><div class="icon amber">😊</div><div><div class="label">Khách khen (≥4⭐)</div><div class="value" id="s_positive">0%</div></div></div>
          </div>

          <div class="card">
            <h3>Cập nhật thông tin</h3>
            <form id="frm">
              <div class="grid cols-2">
                <div class="field"><label>Họ tên</label><input type="text" id="f_name" class="input"></div>
                <div class="field"><label>SĐT</label><input type="text" id="f_phone" class="input"></div>
              </div>
              <div class="grid cols-2">
                <div class="field"><label>Email</label><input type="email" id="f_email" class="input"></div>
                <div class="field"><label>CCCD</label><input type="text" id="f_cccd" class="input"></div>
              </div>
              <div class="field"><label>Khu vực phụ trách (admin gán)</label><input type="text" id="f_area" class="input" disabled></div>
              <button type="submit" class="btn">Lưu thay đổi</button>
            </form>
          </div>

          <div class="card mt-2">
            <h3>Đánh giá gần đây</h3>
            <div id="reviewList"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/tech-shell.js"></script>
<script src="/kithuat/profile.js"></script>
</body>
</html>
