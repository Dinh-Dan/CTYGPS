<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chat khách – Kỹ thuật VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .chat-shell{display:grid;grid-template-columns:300px 1fr;gap:14px;height:calc(100vh - 140px)}
  .conv-list{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:auto}
  .conv-item{padding:12px;border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
  .conv-item:hover{background:#f8fafc}
  .conv-item.active{background:#e0f2fe}
  .conv-item .avatar{width:40px;height:40px}
  .chat-area{background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
  .chat-area-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .chat-area-msgs{flex:1;overflow-y:auto;padding:14px;background:#f8fafc;display:flex;flex-direction:column;gap:6px}
  .chat-area-msgs .msg{max-width:70%}
  .chat-area-msgs .msg.me{align-self:flex-end;background:var(--primary);color:#fff;padding:8px 12px;border-radius:14px 14px 4px 14px}
  .chat-area-msgs .msg.them{align-self:flex-start;background:#fff;border:1px solid var(--border);padding:8px 12px;border-radius:14px 14px 14px 4px}
  .chat-area-msgs .msg .time{font-size:10px;opacity:.7;display:block;margin-top:2px}
  .chat-area-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:#fff}
  .chat-area-input input{flex:1;padding:10px;border:1px solid var(--border);border-radius:6px}
  .chat-area-input button{padding:0 18px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer}
  .empty-chat{flex:1;display:grid;place-items:center;color:var(--muted);background:#f8fafc}
  .unread-dot{background:var(--danger);color:#fff;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600}
  .btn-back-conv{display:none}

  @media (max-width:900px){
    /* Tren mobile: list & area toggle, full-height (tru topnav + bottom-nav) */
    .chat-shell{
      grid-template-columns:1fr;gap:0;
      height:calc(100vh - 56px - 64px);  /* topnav ~56 + bottom-nav ~64 */
    }
    .conv-list, .chat-area{border:none;border-radius:0;height:100%}
    /* Mac dinh: hien list, an area */
    .chat-area{display:none}
    .chat-shell.show-area .conv-list{display:none}
    .chat-shell.show-area .chat-area{display:flex}
    .chat-area-msgs .msg{max-width:85%}
    .btn-back-conv{
      display:inline-flex;align-items:center;justify-content:center;
      background:#f1f5f9;border:none;border-radius:50%;width:36px;height:36px;
      cursor:pointer;font-size:18px;flex-shrink:0;color:var(--text);
    }
    /* Content ko padding tren chat de chiem full (specificity > shared rule) */
    body.tech .main .content{padding:0;padding-bottom:64px}
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Chat khách hàng</h2>
      <div id="topnav-user" class="row" style="gap:10px"></div>
    </div>
    <div class="content">
      <div class="chat-shell" id="chatShell">
        <div class="conv-list" id="convList"></div>
        <div class="chat-area" id="chatArea">
          <div class="empty-chat">Chọn 1 cuộc trò chuyện bên trái</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/socket.js"></script>
<script src="/shared/js/tech-shell.js"></script>
<script src="/kithuat/chat.js"></script>
</body>
</html>
