<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Công việc – Kỹ thuật VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .quick-tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .quick-tabs button { padding:6px 12px; border-radius:999px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; }
  .quick-tabs button.on { background: var(--primary); color:#fff; border-color: var(--primary); }
  .task-card { border:1px solid var(--border); border-radius:10px; padding:12px; background:#fff; margin-bottom:10px; cursor:pointer; }
  .task-card:hover { border-color:#93c5fd; }
  .task-card .head { display:flex; justify-content:space-between; align-items:center; }
  .task-card .meta { font-size:13px; color:#64748b; margin-top:4px; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:600; }
  .pill.gray { background:#e2e8f0; color:#475569; }
  .pill.amber { background:#fef3c7; color:#92400e; }
  .pill.blue { background:#dbeafe; color:#1e40af; }
  .pill.green { background:#dcfce7; color:#166534; }
  .od-section { margin-bottom:14px; padding-bottom:12px; border-bottom:1px dashed var(--border); }
  .od-section:last-child { border-bottom:none; }
  .od-section h4 { margin:0 0 8px; font-size:13px; text-transform:uppercase; color:#64748b; letter-spacing:.4px; }
  .timeline-step { display:flex; gap:8px; align-items:center; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:#f8fafc; margin-bottom:6px; font-size:13px; }
  .timeline-step.done { background:#dcfce7; border-color:#86efac; }
  .timeline-step.current { background:#dbeafe; border-color:#93c5fd; font-weight:600; }
  .timeline-step .seq { width:22px; height:22px; border-radius:50%; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
  .timeline-step.done .seq { background:#16a34a; color:#fff; }
  .timeline-step.current .seq { background:#1e40af; color:#fff; }
  .timeline-step .btn-jump { margin-left:auto; padding:3px 10px; font-size:12px; }
  .photos { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
  .photos img { width:100%; height:100px; object-fit:cover; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav"><h2 class="topnav-title">Công việc</h2></div>
    <div class="content">
      <div class="quick-tabs" id="quickTabs">
        <button data-bucket="active" class="on">Đang làm</button>
        <button data-bucket="done">Đã xong</button>
        <button data-bucket="cancelled">Đã huỷ</button>
      </div>
      <div id="tasksList"><p class="text-muted">Đang tải…</p></div>
    </div>
  </main>
</div>

<div id="modal" class="modal-bg">
  <div class="modal" style="max-width:760px">
    <div class="modal-head">
      <h3 id="modalTitle">Chi tiết</h3>
      <button type="button" class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="odBody" style="padding:14px"></div>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/imgbb.js"></script>
<script src="/shared/js/tech-shell.js"></script>
<script src="/kithuat/tasks.js"></script>
</body>
</html>
