<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Đơn gia hạn GPS – GPS Việt</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  body { background:#f1f5f9; }
  .wrap { max-width:720px; margin:24px auto; padding:0 16px; }
  .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .panel h2 { margin:0 0 12px 0; font-size:18px; }
  .panel h3 { margin:16px 0 8px 0; font-size:15px; color:#475569; }
  .order-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .order-head .code { font-size:20px; font-weight:700; }
  .table-vehicles { width:100%; border-collapse:collapse; font-size:14px; }
  .table-vehicles th, .table-vehicles td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:left; }
  .table-vehicles th { background:#f8fafc; font-weight:600; color:#475569; }
  .total-line { display:flex; justify-content:space-between; padding:6px 0; }
  .total-line.grand { font-size:18px; font-weight:700; border-top:2px solid var(--border); margin-top:8px; padding-top:12px; color:var(--primary); }
  .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
  .actions .btn { flex:1; min-width:140px; }
  .qr-box { text-align:center; padding:16px; background:#f8fafc; border-radius:10px; }
  .qr-box img { max-width:240px; max-height:240px; border:4px solid #fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .bank-info { background:#fef3c7; border:1px solid #fcd34d; border-radius:10px; padding:12px; margin-top:12px; }
  .bank-info .row { display:flex; justify-content:space-between; padding:4px 0; font-size:14px; }
  .bank-info .row b { font-family:monospace; font-size:15px; }
  .copy-btn { background:none; border:1px solid #cbd5e1; padding:2px 8px; border-radius:4px; cursor:pointer; font-size:12px; margin-left:8px; }
  .copy-btn:hover { background:#e2e8f0; }
  .status-msg { padding:14px; border-radius:10px; margin-top:12px; text-align:center; font-weight:600; }
  .status-msg.success { background:#d1fae5; color:#065f46; border:1px solid #10b981; }
  .status-msg.info { background:#dbeafe; color:#1e40af; border:1px solid #3b82f6; }
  .status-msg.warning { background:#fef3c7; color:#92400e; border:1px solid #f59e0b; }
  .empty-state { text-align:center; padding:60px 20px; color:#64748b; }
</style>
</head>
<body>

<header class="site" style="background:#fff;border-bottom:1px solid var(--border)">
  <div class="container" style="padding:14px 20px">
    <a class="logo" href="/" style="text-decoration:none"><span class="logo-mark">GV</span> GPS VIỆT</a>
  </div>
</header>

<div class="wrap" id="root">
  <div class="empty-state">Đang tải...</div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/customer/order-public.js"></script>
</body>
</html>
