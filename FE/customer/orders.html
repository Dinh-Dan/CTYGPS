<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />

<title>Đơn của tôi – VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .order-card { border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; background:#fff; cursor:pointer; }
  .order-card:hover { border-color:#93c5fd; }
  .order-card .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .order-card .meta { font-size:13px; color:#64748b; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:600; }
  .pill.gray  { background:#e2e8f0; color:#475569; }
  .pill.amber { background:#fef3c7; color:#92400e; }
  .pill.blue  { background:#dbeafe; color:#1e40af; }
  .pill.green { background:#dcfce7; color:#166534; }
  .pill.red   { background:#fee2e2; color:#991b1b; }
  .od-section { margin-bottom:14px; padding-bottom:12px; border-bottom:1px dashed var(--border); }
  .od-section:last-child { border-bottom:none; }
  .od-section h4 { margin:0 0 8px; font-size:13px; text-transform:uppercase; color:#64748b; letter-spacing:.4px; }
  .timeline-step {
    display:flex; gap:8px; align-items:center; padding:8px;
    border:1px solid var(--border); border-radius:8px; background:#f8fafc; margin-bottom:6px; font-size:13px;
  }
  .timeline-step.done    { background:#dcfce7; border-color:#86efac; }
  .timeline-step.current { background:#dbeafe; border-color:#93c5fd; font-weight:600; }
  .timeline-step .seq { width:22px; height:22px; border-radius:50%; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
  .timeline-step.done    .seq { background:#16a34a; color:#fff; }
  .timeline-step.current .seq { background:#1e40af; color:#fff; }
  .item-row, .charge-row, .field-row { display:flex; gap:8px; padding:5px 0; font-size:13.5px; }
  .photos { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
  .photos img { width:100%; height:100px; object-fit:cover; border-radius:6px; cursor:pointer; }
</style>
</head>

<div class="topbar"><div class="container"><div>☎ (028) 6682 5658</div><div id="topbarRight"></div></div></div>

    </nav>

  </div>
</header>

<div class="container" style="padding:30px 20px;max-width:900px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px">
    <div>
      <h1 style="margin:0">Đơn của tôi</h1>
      <p class="text-muted" id="userInfo">—</p>
    </div>
    <a href="order.html" class="btn">+ Tạo đơn mới</a>

      <h3 id="modalTitle">Chi tiết đơn</h3>
      <button type="button" class="modal-close" id="modalClose">×</button>
    </div>
