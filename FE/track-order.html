<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Theo dõi đơn — VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  body{background:#f1f5f9}
  .track-wrap{max-width:760px;margin:0 auto;padding:24px 16px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:#1e40af;font-weight:700;font-size:18px}
  .brand .logo-mark{background:#2563eb;color:#fff;border-radius:8px;width:34px;height:34px;display:grid;place-items:center;font-weight:800}
  .panel{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.06);margin-bottom:14px}
  .panel h3{margin:0 0 10px;font-size:15px;color:#475569}
  .lookup{display:flex;gap:8px}
  .lookup input{flex:1;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
  .lookup button{padding:10px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px}
  .summary-grid > div{padding:6px 0}
  .summary-grid b{color:#0f172a}
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:#e2e8f0}
  .step{position:relative;padding:8px 0 14px}
  .step::before{content:"";position:absolute;left:-21px;top:12px;width:14px;height:14px;border-radius:50%;background:#cbd5e1;border:3px solid #fff;box-shadow:0 0 0 1px #cbd5e1}
  .step.active::before{background:#2563eb;box-shadow:0 0 0 1px #2563eb}
  .step.done::before{background:#16a34a;box-shadow:0 0 0 1px #16a34a}
  .step .name{font-weight:600;font-size:14px}
  .step .meta{font-size:12.5px;color:#64748b;margin-top:2px}
  .step.active .name{color:#2563eb}
  .step.done .name{color:#16a34a}
  .item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
  .item:last-child{border:none}
  .item img{width:46px;height:46px;border-radius:6px;object-fit:cover;background:#f1f5f9}
  .item .name{font-weight:600;font-size:14px}
  .item .meta{color:#64748b;font-size:12.5px}
  .item .total{font-weight:600;color:#0f172a;white-space:nowrap}
  .bill .row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
  .bill .row.total{font-size:17px;font-weight:700;color:#2563eb;padding-top:8px;border-top:1px dashed #cbd5e1;margin-top:6px}
  .empty{text-align:center;color:#94a3b8;padding:40px 12px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.gray{background:#f1f5f9;color:#475569}
  .pill.purple{background:#ede9fe;color:#6d28d9}
  .pill.blue{background:#dbeafe;color:#1e40af}
  .pill.cyan{background:#cffafe;color:#155e75}
  .pill.amber{background:#fef3c7;color:#92400e}
  .pill.green{background:#dcfce7;color:#166534}
  .pill.red{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div class="track-wrap">
  <div class="brand">
    <span class="logo-mark">GV</span>
    <span>VinaGPS — Theo dõi đơn hàng</span>
  </div>

  <div class="panel">
    <h3>Mã đơn</h3>
    <form class="lookup" id="lookupForm">
      <input id="codeInput" placeholder="VD: ORD-2704-001" autocomplete="off">
      <button type="submit">Tra cứu</button>
    </form>
  </div>

  <div id="content"></div>
</div>

<script src="/shared/js/api.js"></script>
<script>
(function () {
  const $ = id => document.getElementById(id);
  const fmt = new Intl.NumberFormat('vi-VN');

  const STATUS_LABEL = {
    pending_review:        { text: 'Đang chờ duyệt',           cls: 'purple' },
    new:                   { text: 'Đã chốt',                  cls: 'gray'   },
    assigned:              { text: 'Đã giao KTV',              cls: 'blue'   },
    warehouse_released:    { text: 'Đã xuất kho',              cls: 'cyan'   },
    in_progress:           { text: 'Đang lắp đặt',             cls: 'amber'  },
    customer_owes:         { text: 'Chưa thanh toán đủ',       cls: 'amber'  },
    pending_admin_confirm: { text: 'Đang đối chiếu thanh toán',cls: 'amber'  },
    staff_owes:            { text: 'Hoàn thành',               cls: 'green'  },
    done:                  { text: 'Hoàn thành',               cls: 'green'  },
    cancelled:             { text: 'Đã huỷ',                   cls: 'red'    },
  };
  const KIND_LABEL = {
    install: 'Lắp đặt', maintenance: 'Bảo trì',
    renew: 'Gia hạn', uninstall: 'Tháo gỡ',
  };
  const STEPS = [
    { key: 'pending',     label: '⏳ Đang chờ' },
    { key: 'confirmed',   label: '✓ Đã lên đơn' },
    { key: 'in_progress', label: '🛠 Đang xử lý' },
    { key: 'done',        label: '🎉 Hoàn thành' },
  ];

  function escape(s) {
    if (s == null) return '';
    return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
  function statusPill(s) {
    const def = STATUS_LABEL[s] || { text: s, cls: 'gray' };
    return `<span class="pill ${def.cls}">${def.text}</span>`;
  }
  function fmtTs(ts) {
    if (!ts) return '';
    const d = new Date(String(ts).replace(' ', 'T'));
    if (isNaN(d)) return '';
    return d.toLocaleString('vi-VN', { dateStyle: 'short', timeStyle: 'short' });
  }

  function renderTimeline(o) {
    if (o.status === 'cancelled') {
      return `<div class="empty" style="color:#dc2626">Đơn này đã huỷ.</div>`;
    }
    // Cac status no/cho-xac-nhan deu coi nhu da qua buoc 'done' trong timeline khach
    const FINAL_LIKE = ['done','staff_owes','pending_admin_confirm','customer_owes'];
    const effective = FINAL_LIKE.includes(o.status) ? 'done' : o.status;
    const idx = STEPS.findIndex(s => s.key === effective);
    return `
      <div class="timeline">
        ${STEPS.map((s, i) => {
          const cls = i < idx ? 'done' : (i === idx ? 'active' : '');
          return `
            <div class="step ${cls}">
              <div class="name">${s.label}</div>
              ${i === idx ? '<div class="meta">Đang ở bước này</div>' : ''}
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderKtvInfo(o) {
    if (!o.staff_name && !o.started_at && !o.completed_at) return '';
    return `
      <div class="panel">
        <h3>👨‍🔧 Tiến độ kỹ thuật</h3>
        <div style="padding:8px 0">
          <div><b>${escape(KIND_LABEL[o.kind] || o.kind || '')}</b></div>
          ${o.staff_name ? `<div style="color:#64748b;font-size:13px;margin-top:2px">KTV: ${escape(o.staff_name)}</div>` : ''}
          ${o.started_at ? `<div style="color:#64748b;font-size:12.5px">Bắt đầu: ${fmtTs(o.started_at)}</div>` : ''}
          ${o.completed_at ? `<div style="color:#16a34a;font-size:12.5px">Hoàn thành: ${fmtTs(o.completed_at)}</div>` : ''}
        </div>
      </div>`;
  }

  function renderItems(items) {
    if (!items.length) return '';
    return `
      <div class="panel">
        <h3>📦 Sản phẩm</h3>
        ${items.map(it => `
          <div class="item">
            ${it.thumbnail_url ? `<img src="${escape(it.thumbnail_url)}" alt="">` : '<div style="width:46px;height:46px;background:#f1f5f9;border-radius:6px;display:grid;place-items:center">📦</div>'}
            <div style="flex:1">
              <div class="name">${escape(it.product_name)}</div>
              <div class="meta">${escape(it.product_code)} · SL: ${it.qty} × ${fmt.format(it.unit_price)}đ</div>
            </div>
            <div class="total">${fmt.format(it.qty * it.unit_price)}đ</div>
          </div>`).join('')}
      </div>`;
  }

  function renderBill(o) {
    const charges = o.charges || [];
    const chargeSum = charges.reduce((s, c) => s + Number(c.amount || 0), 0);
    const subtotal = Number(o.subtotal || 0);
    const total = Number(o.total_amount || 0);
    const paid = Number(o.paid_amount || 0);
    return `
      <div class="panel bill">
        <h3>💵 Bill thanh toán</h3>
        <div class="row"><span>Tạm tính:</span><span>${fmt.format(subtotal)}đ</span></div>
        ${charges.map(c => `<div class="row" style="color:${Number(c.amount) < 0 ? '#16a34a' : '#475569'}"><span>${escape(c.label || c.kind)}</span><span>${Number(c.amount) > 0 ? '+' : ''}${fmt.format(c.amount)}đ</span></div>`).join('')}
        <div class="row total"><span>Tổng đơn:</span><span>${fmt.format(total)}đ</span></div>
        ${paid > 0 ? `<div class="row"><span>Đã thanh toán:</span><span>${fmt.format(paid)}đ</span></div>` : ''}
        ${total - paid > 0 ? `<div class="row" style="color:#dc2626"><span>Còn phải thu:</span><span>${fmt.format(total - paid)}đ</span></div>` : ''}
      </div>`;
  }

  function renderOrder(o) {
    $('content').innerHTML = `
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <h3 style="margin:0;font-size:17px;color:#0f172a">Đơn ${escape(o.code)}</h3>
          ${statusPill(o.status)}
        </div>
        <div class="summary-grid">
          ${o.customer_name ? `<div><b>Khách:</b> ${escape(o.customer_name)}</div>` : ''}
          ${o.customer_phone ? `<div><b>SĐT:</b> ${escape(o.customer_phone)}</div>` : ''}

        </div>
        ${o.address ? `<div style="margin-top:6px"><b>Địa chỉ:</b> ${escape(o.address)}</div>` : ''}
      </div>

      <div class="panel">
        <h3>📍 Tiến độ đơn</h3>
        ${renderTimeline(o)}
      </div>

      ${renderKtvInfo(o)}
      ${renderItems(o.items || [])}
      ${renderBill(o)}

      <div style="text-align:center;color:#94a3b8;font-size:12px;margin-top:20px">
        Cập nhật mới nhất: ${fmtTs(new Date().toISOString())}
      </div>
    `;
  }

  async function lookup(code) {
    code = String(code || '').trim();
    if (!code) return;
    $('content').innerHTML = '<div class="panel"><div class="empty">Đang tải...</div></div>';
    const res = await api.get('/public/orders/' + encodeURIComponent(code), { silent: true })
      .catch(err => ({ __error: err }));
    if (res.__error) {
      const e = res.__error;
      let msg;
      if (e.status === 404)      msg = 'Không tìm thấy đơn với mã này';
      else if (e.status === 0)   msg = 'Không kết nối được máy chủ';
      else                       msg = `Lỗi máy chủ (${e.status || '?'}): ${escape(e.message || 'Unknown')}`;
      $('content').innerHTML = `<div class="panel"><div class="empty" style="color:#dc2626">${msg}</div></div>`;
      return;
    }
    renderOrder(res);
  }

  $('lookupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = $('codeInput').value.trim();
    if (!code) return;
    history.replaceState(null, '', `?code=${encodeURIComponent(code)}`);
    lookup(code);
  });

  // Auto-lookup neu URL co ?code=xxx
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) {
    $('codeInput').value = code;
    lookup(code);
  }
})();
</script>
</body>
</html>
