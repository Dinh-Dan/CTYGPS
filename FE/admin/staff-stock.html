<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phát hàng KTV – Admin VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  /* ===== Tabs ===== */
  .ss-tabs { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-bottom:14px; flex-shrink:0; }
  .ss-tab { padding:10px 20px; background:transparent; border:none; cursor:pointer; font-size:13.5px; color:#64748b; font-weight:500; border-bottom:2px solid transparent; margin-bottom:-2px; transition:.15s; }
  .ss-tab:hover { color:#1e40af; background:#f0f9ff; }
  .ss-tab.active { color:#1e40af; border-bottom-color:#1e40af; font-weight:700; }

  .ss-pane { display:none; flex:1; min-height:0; flex-direction:column; }
  .ss-pane.active { display:flex; }

  /* ===== Holdings: shelf card per KTV ===== */
  .holdings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; }
  .ktv-shelf { background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(15,23,42,.05); transition:.15s; }
  .ktv-shelf:hover { box-shadow:0 4px 14px rgba(15,23,42,.09); }
  .ktv-shelf-head { display:flex; align-items:center; gap:12px; padding:12px 14px; background:linear-gradient(100deg,#f0f9ff 0%,#fff 100%); border-bottom:1px solid #e7f0f9; }
  .ktv-shelf-avatar { width:40px; height:40px; border-radius:50%; background:#0ea5e9; color:#fff; display:grid; place-items:center; font-weight:700; font-size:17px; flex-shrink:0; }
  .ktv-shelf-name { font-size:15px; font-weight:700; color:#0f172a; line-height:1.2; }
  .ktv-shelf-phone { font-size:12px; color:#64748b; margin-top:2px; }
  .ktv-shelf-total { margin-left:auto; flex-shrink:0; }
  .ktv-shelf-body { }
  .ktv-shelf-table { width:100%; border-collapse:collapse; font-size:13px; }
  .ktv-shelf-table td { padding:9px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
  .ktv-shelf-table tr:last-child td { border-bottom:none; }
  .ktv-shelf-table .td-name { color:#1e293b; }
  .ktv-shelf-table .td-code { color:#94a3b8; font-size:11.5px; font-family:monospace; width:90px; }
  .ktv-shelf-table .td-qty { font-size:17px; font-weight:700; color:#0369a1; width:52px; text-align:right; padding-right:16px; }
  .ktv-shelf-empty { padding:16px 14px; color:#94a3b8; font-size:13px; font-style:italic; }

  /* ===== Grant form ===== */
  .grant-wrap { max-width:800px; }
  .grant-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:18px 20px; }
  .grant-card h3 { font-size:15px; font-weight:700; margin:0 0 14px; color:#0f172a; }
  .grant-items { width:100%; border-collapse:collapse; font-size:13px; }
  .grant-items th { background:#f8fafc; padding:7px 10px; text-align:left; border-bottom:1px solid #e2e8f0; font-size:11.5px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.3px; }
  .grant-items td { padding:7px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
  .grant-items tr:last-child td { border-bottom:none; }
  .grant-items input, .grant-items select, .grant-items textarea { padding:6px 9px; font-size:13px; width:100%; }
  .btn-x { background:#fee2e2; color:#991b1b; border:none; border-radius:6px; width:26px; height:26px; cursor:pointer; font-size:14px; line-height:1; }
  .btn-x:hover { background:#fca5a5; }

  /* ===== History ===== */
  .history-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .history-card .hc-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
  .history-card .hc-code { font-weight:700; font-size:13.5px; color:#0f172a; }
  .history-card .hc-ktv { font-size:12.5px; color:#475569; }
  .history-card .hc-time { font-size:11.5px; color:#94a3b8; margin-left:auto; }
  .history-card .hc-body { font-size:12.5px; color:#334155; line-height:1.6; }
  .history-card .hc-note { font-size:12px; color:#64748b; margin-top:4px; font-style:italic; }
  .badge-grant { background:#dbeafe; color:#1e40af; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-revoke { background:#dcfce7; color:#15803d; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <div style="display:flex;flex-direction:column;justify-content:center;line-height:1.2">
        <span style="font-size:16px;font-weight:700;color:#0f172a">Kho cá nhân KTV</span>
        <span style="font-size:11px;color:#64748b">KTV ôm sẵn hàng để đi lắp nhiều đơn — phát &amp; thu hồi tại đây.</span>
      </div>
      <div class="row" id="topnav-user"></div>
    </div>
    <div class="content flex-page">

      <div class="ss-tabs">
        <button class="ss-tab active" data-tab="holdings">Tồn kho KTV</button>
        <button class="ss-tab" data-tab="grant">+ Phát hàng</button>
        <button class="ss-tab" data-tab="history">Lịch sử</button>
      </div>

      <!-- TAB: Holdings -->
      <div class="ss-pane active" data-pane="holdings" style="overflow:auto">
        <div id="holdingsList" class="holdings-grid"></div>
      </div>

      <!-- TAB: Grant -->
      <div class="ss-pane" data-pane="grant" style="overflow:auto">
        <div class="grant-wrap">
          <div class="grant-card">
            <h3>Phát hàng từ kho công ty</h3>
            <div class="field">
              <label>Chọn KTV nhận hàng *</label>
              <select id="grantStaff" class="select" style="max-width:320px"></select>
            </div>
            <table class="grant-items">
              <thead>
                <tr>
                  <th>Sản phẩm</th>
                  <th style="width:100px">Số lượng</th>
                  <th style="width:260px">IMEI (tuỳ chọn, mỗi dòng 1 IMEI)</th>
                  <th style="width:36px"></th>
                </tr>
              </thead>
              <tbody id="grantItems"></tbody>
            </table>
            <div style="margin-top:8px">
              <button class="btn ghost sm" id="btnAddGrantRow">+ Thêm sản phẩm</button>
            </div>
            <div class="field" style="margin-top:14px">
              <label>Ghi chú</label>
              <input id="grantNote" type="text" class="input" placeholder="VD: Cấp đợt tháng 5..." style="max-width:480px">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9">
              <button class="btn" id="btnGrantSubmit">Xác nhận phát hàng</button>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB: History -->
      <div class="ss-pane" data-pane="history" style="overflow:auto">
        <div style="background:#fff;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0">
          <div class="field" style="margin:0;min-width:160px">
            <label style="font-size:11.5px;color:#64748b;display:block;margin-bottom:3px">KTV</label>
            <select id="histStaff" class="select" style="padding:7px 10px;font-size:13px"></select>
          </div>
          <div class="field" style="margin:0;min-width:130px">
            <label style="font-size:11.5px;color:#64748b;display:block;margin-bottom:3px">Loại</label>
            <select id="histReason" class="select" style="padding:7px 10px;font-size:13px">
              <option value="">Tất cả</option>
              <option value="staff_grant">Phát hàng</option>
              <option value="staff_revoke">Thu hồi</option>
            </select>
          </div>
          <div class="field" style="margin:0">
            <label style="font-size:11.5px;color:#64748b;display:block;margin-bottom:3px">Từ ngày</label>
            <input id="histFrom" type="date" class="input" style="padding:7px 10px;font-size:13px">
          </div>
          <div class="field" style="margin:0">
            <label style="font-size:11.5px;color:#64748b;display:block;margin-bottom:3px">Đến ngày</label>
            <input id="histTo" type="date" class="input" style="padding:7px 10px;font-size:13px">
          </div>
          <div class="field" style="margin:0;flex:1;min-width:160px">
            <label style="font-size:11.5px;color:#64748b;display:block;margin-bottom:3px">Mã phiếu</label>
            <input id="histQ" type="text" class="input" placeholder="VD: PX-260510-..." style="padding:7px 10px;font-size:13px;width:100%">
          </div>
          <button class="btn sm" id="btnHistReload">Lọc</button>
          <button class="btn ghost sm" id="btnHistClear">Xoá lọc</button>
        </div>
        <div id="historyList" style="overflow:auto"></div>
      </div>

    </div>
  </main>
</div>

<script src="/shared/js/api.js"></script>
<script src="/shared/js/ui.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="/admin/staff-stock.js"></script>
</body>
</html>
