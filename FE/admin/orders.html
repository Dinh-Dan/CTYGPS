<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Đơn hàng – Admin VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  .pill { display:inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1; border: 1px solid transparent; }
  .pill.gray   { background:#f1f5f9; color:#475569; border-color: #e2e8f0; }
  .pill.blue   { background:#eff6ff; color:#1d4ed8; border-color: #bfdbfe; }
  .pill.amber  { background:#fffbeb; color:#b45309; border-color: #fde68a; }
  .pill.green  { background:#f0fdf4; color:#15803d; border-color: #bbf7d0; }
  .pill.red    { background:#fef2f2; color:#b91c1c; border-color: #fecaca; }
  .pill.purple { background:#faf5ff; color:#7e22ce; border-color: #e9d5ff; }
  .quick-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; background: #fff; padding: 10px 14px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); }
  .quick-tabs button {
    padding:8px 18px; border-radius:8px; border:none;
    background:transparent; cursor:pointer; font-size:14px; font-weight: 500; color: #64748b; transition: all 0.2s ease;
  }
  .quick-tabs button:hover { background: #f1f5f9; color: #0f172a; }
  .quick-tabs button.on { background: var(--primary-soft); color: var(--primary); font-weight: 600; box-shadow: inset 0 0 0 1px var(--primary); }

  .toolbar {
    background: #fff; padding: 14px 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); margin-bottom: 16px;
  }
  .toolbar .btn { box-shadow: 0 2px 6px rgba(31, 111, 235, 0.25); transition: transform 0.1s, box-shadow 0.1s; }
  .toolbar .btn:active { transform: translateY(1px); box-shadow: none; }
  
  .table-wrap { box-shadow: 0 8px 24px rgba(15,23,42,0.06); border: 1px solid #f1f5f9; border-radius: 14px; overflow: hidden; background: #fff; margin-bottom: 0; }
  table.data { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.data thead th { background: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11.5px; border-bottom: 1px solid #e2e8f0; padding: 10px 12px; }
  table.data tbody td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; font-size: 13.5px; vertical-align: middle; }
  table.data tbody tr:last-child td { border-bottom: none; }
  table.data tbody tr { transition: background-color 0.2s ease; }
  table.data tbody tr:hover { background-color: #f8fafc; }
  table.data thead tr.filter-row th { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 6px 12px; }
  table.data thead tr.filter-row input, table.data thead tr.filter-row select { background: #f1f5f9; border: 1px solid transparent; transition: all 0.2s ease; border-radius: 6px; padding: 5px 8px; font-size: 12.5px; width: 100%; box-sizing: border-box; color: #0f172a; outline: none; height: 32px; }
  table.data thead tr.filter-row input:focus, table.data thead tr.filter-row select:focus { background: #fff; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  
  .pager { background: #fff; padding: 12px 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); margin-top: 20px; }
  .pager button { padding: 8px 16px; font-weight: 600; border-radius: 8px; transition: all 0.2s; border: 1px solid var(--border); background: #fff; cursor: pointer; color: #475569; }
  .pager button:hover:not(:disabled) { background: #f8fafc; color: var(--primary); border-color: var(--primary); }
  .pager #pageInfo { font-weight: 600; color: #0f172a; margin: 0 16px; display: inline-block; min-width: 80px; text-align: center; }

  .od-detail { padding:14px; }
  .od-section { margin-bottom:18px; padding-bottom:14px; border-bottom:1px dashed var(--border); }
  .od-section:last-child { border-bottom:none; }
  .od-section h4 {
    margin: 0 0 8px; font-size:13px; text-transform:uppercase;
    color:#64748b; letter-spacing:.4px; display:flex; justify-content:space-between; align-items:center;
  }

  .stepper {
    display:flex; align-items:flex-start; gap:0;
    padding:14px 6px 6px; overflow-x:auto;
  }
  .stepper-step {
    flex:1 1 0; min-width:90px; position:relative;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .stepper-step + .stepper-step::before {
    content:''; position:absolute; top:16px; left:-50%; right:50%;
    height:3px; background:#e2e8f0; z-index:0;
  }
  .stepper-step.done + .stepper-step::before,
  .stepper-step.current::before { background:#16a34a; }
  .stepper-dot {
    position:relative; z-index:1;
    width:34px; height:34px; border-radius:50%;
    background:#e2e8f0; color:#64748b;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
    border:3px solid #fff; box-shadow:0 0 0 1px #e2e8f0;
    transition:all .2s ease;
  }
  .stepper-step.done .stepper-dot {
    background:#16a34a; color:#fff; box-shadow:0 0 0 1px #16a34a;
  }
  .stepper-step.current .stepper-dot {
    background:#1e40af; color:#fff; box-shadow:0 0 0 1px #1e40af, 0 0 0 5px #dbeafe;
    transform:scale(1.15);
  }
  .stepper-label {
    margin-top:6px; font-size:12px; color:#64748b; line-height:1.25;
    max-width:110px; word-break:break-word;
  }
  .stepper-step.current .stepper-label { color:#1e40af; font-weight:600; }
  .stepper-step.done    .stepper-label { color:#16a34a; }
  .stepper-icons { font-size:11px; margin-top:2px; }
  .stepper-photos-badge {
    margin-top:4px; font-size:11px; color:#1e40af; font-weight:600;
    background:#dbeafe; padding:1px 6px; border-radius:999px;
    cursor:pointer; user-select:none;
  }
  .stepper-step.done .stepper-photos-badge { background:#dcfce7; color:#166534; }
  .stepper-pop {
    display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
    margin-bottom:8px; background:#0f172a; color:#fff;
    padding:8px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.25);
    z-index:20; min-width:180px; max-width:280px;
  }
  .stepper-pop::after {
    content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#0f172a;
  }
  .stepper-pop .pop-grid {
    display:grid; grid-template-columns:repeat(3, 1fr); gap:4px;
  }
  .stepper-pop .pop-grid img {
    width:100%; height:60px; object-fit:cover; border-radius:4px;
    cursor:pointer; background:#334155;
  }
  .stepper-pop .pop-title {
    font-size:11px; color:#cbd5e1; margin-bottom:4px; text-align:center;
  }
  .stepper-step:hover .stepper-pop,
  .stepper-step.pop-open .stepper-pop { display:block; }

  .stepper-action {
    margin-top:10px; display:flex; justify-content:flex-end; gap:8px;
    padding-top:10px; border-top:1px dashed var(--border);
  }
  .stepper-action .next-label {
    flex:1; font-size:13px; color:#64748b; align-self:center;
  }
  .stepper-action .next-label b { color:#0f172a; }

  .photo-list { display:flex; flex-direction:column; gap:14px; }
  .photo-group { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  .photo-group-head {
    font-size:12px; font-weight:600; color:#1e40af;
    text-transform:uppercase; letter-spacing:.3px; margin-bottom:8px;
  }
  .photo-group-head small { color:#64748b; font-weight:500; text-transform:none; letter-spacing:0; }
  .photo-group-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:8px; }

  .item-list, .charge-list, .field-list, .photo-list { font-size:13.5px; }
  .item-list .row, .charge-list .row, .field-list .row {
    display:flex; gap:8px; padding:6px 8px; align-items:center; border-bottom:1px solid #f1f5f9;
  }
  .item-list .row { transition:background .15s; }
  .item-list .row:hover { background:#f8fafc; }
  .item-list .row .name { flex:2; }
  .item-list .row .qty  { width:50px; text-align:right; }
  .item-list .row .price{ width:110px; text-align:right; }
  .item-list .row .vat  { width:60px;  text-align:right; color:#64748b; }
  .item-list .row .sub  { width:130px; text-align:right; font-weight:600; }

  /* ======== Hoa don bao gia ======== */
  .invoice {
    background:#fff; padding:28px 32px; max-width:780px; margin:0 auto;
    font-family:'Segoe UI', Tahoma, sans-serif; color:#0f172a;
    box-shadow:0 4px 24px rgba(0,0,0,.06); border-radius:6px;
  }
  .invoice .inv-head {
    display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:3px solid #1e40af; padding-bottom:14px; margin-bottom:18px;
  }
  .invoice .inv-head .co h2 { margin:0 0 4px; color:#1e40af; font-size:22px; }
  .invoice .inv-head .co .meta { font-size:12px; color:#475569; line-height:1.55; }
  .invoice .inv-head .stamp { text-align:right; }
  .invoice .inv-head .stamp .ttl { font-size:22px; font-weight:700; color:#1e40af; letter-spacing:1px; }
  .invoice .inv-head .stamp .code { font-size:13px; color:#475569; margin-top:4px; }

  .invoice .inv-info { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; font-size:13px; }
  .invoice .inv-info .col { flex:1; min-width:240px; line-height:1.7; }
  .invoice .inv-info .lbl { color:#64748b; display:inline-block; width:90px; }

  .invoice table.inv-tbl {
    width:100%; border-collapse:collapse; font-size:13px; margin-bottom:14px;
  }
  .invoice table.inv-tbl th, .invoice table.inv-tbl td {
    border:1px solid #cbd5e1; padding:7px 9px; text-align:left;
  }
  .invoice table.inv-tbl thead th {
    background:#1e40af; color:#fff; font-weight:600; font-size:12px;
    text-transform:uppercase; letter-spacing:.3px;
  }
  .invoice table.inv-tbl td.r { text-align:right; }
  .invoice table.inv-tbl td.c { text-align:center; }
  .invoice table.inv-tbl tbody tr:nth-child(even) { background:#f8fafc; }
  .invoice table.inv-tbl tfoot td {
    background:#eff6ff; font-weight:600;
  }
  .invoice table.inv-tbl tfoot tr.grand td { background:#1e40af; color:#fff; font-size:15px; }

  .invoice .inv-foot { display:flex; gap:14px; flex-wrap:wrap; margin-top:14px; font-size:13px; }
  .invoice .inv-foot .col { flex:1; min-width:240px; }
  .invoice .inv-foot .col h5 { margin:0 0 6px; color:#1e40af; font-size:13px; text-transform:uppercase; letter-spacing:.4px; }
  .invoice .inv-foot .pay { padding:10px 12px; background:#f8fafc; border-left:3px solid #1e40af; border-radius:4px; }
  .invoice .signs {
    display:flex; justify-content:space-between; margin-top:30px;
    text-align:center; font-size:13px;
  }
  .invoice .signs > div { flex:1; }
  .invoice .signs .role { font-weight:600; }
  .invoice .signs .hint { color:#94a3b8; font-size:11px; margin:2px 0 50px; }
  .invoice .signs .name { border-top:1px dashed #cbd5e1; padding-top:6px; min-height:20px; }

  .inv-toolbar {
    display:flex; gap:8px; padding:10px 14px; background:#f1f5f9;
    border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:5;
  }

  @media print {
    body * { visibility:hidden; }
    #invoiceModal, #invoiceModal * { visibility:visible; }
    #invoiceModal { position:absolute; left:0; top:0; width:100%; }
    .inv-toolbar, .modal-close { display:none !important; }
    .invoice { box-shadow:none; max-width:100%; padding:0; }
  }

  .photo-list .ph {
    border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff;
  }
  .photo-list .ph img { width:100%; height:100px; object-fit:cover; cursor:pointer; }
  .photo-list .ph .meta { font-size:11px; padding:4px 6px; color:#64748b; }

  .bill { background:#f8fafc; border-radius:10px; padding:12px 14px; }
  .bill .row { display:flex; justify-content:space-between; padding:3px 0; font-size:14px; }
  .bill .total { font-size:16px; font-weight:700; color:var(--primary); border-top:1px dashed #cbd5e1; padding-top:8px; margin-top:6px; }
  .bill .remain { color:#dc2626; font-weight:600; }

  .od-actions { flex-wrap:wrap; justify-content:flex-start; }
  .od-actions .btn { flex:0 1 auto; min-width:0; white-space:nowrap; }

  /* Hoa hong KTV — card noi bat */
  .commission-card {
    position:relative; border-radius:14px; padding:16px 18px;
    background:linear-gradient(135deg,#fff7ed 0%,#fef3c7 55%,#fee2e2 100%);
    border:1px solid #fcd34d; box-shadow:0 4px 14px rgba(217,119,6,.12);
  }
  .commission-card::before {
    content:""; position:absolute; top:-30px; right:-30px;
    width:120px; height:120px; border-radius:50%;
    background:radial-gradient(circle,rgba(251,191,36,.35) 0%,transparent 70%);
    pointer-events:none;
  }
  .commission-card .cc-head {
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
    font-weight:700; color:#92400e; font-size:15px; letter-spacing:.2px;
  }
  .commission-card .cc-head .star { font-size:18px; }
  .commission-card .cc-pill {
    display:inline-flex; align-items:center; gap:4px; padding:2px 8px;
    border-radius:999px; font-size:11px; font-weight:700; margin-left:auto;
  }
  .commission-card .cc-pill.approved { background:#16a34a; color:#fff; }
  .commission-card .cc-pill.pending  { background:#fde68a; color:#92400e; }
  .commission-card .cc-amount {
    font-size:26px; font-weight:800; color:#b45309;
    letter-spacing:.5px;
  }
  .commission-card .cc-amount.empty { font-size:15px; color:#9a3412; font-weight:600; font-style:italic; }
  .commission-card .cc-meta {
    margin-top:6px; font-size:12.5px; color:#7c2d12;
  }
  .commission-card .cc-note {
    margin-top:8px; padding:8px 10px; background:rgba(255,255,255,.55);
    border-radius:8px; font-size:13px; color:#7c2d12; white-space:pre-wrap;
  }
  .commission-card .cc-actions {
    margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .commission-card .cc-actions .btn-cc {
    background:#f59e0b; color:#fff; border:none; padding:7px 14px;
    border-radius:8px; font-weight:600; cursor:pointer; font-size:13px;
    transition:all .15s ease;
  }
  .commission-card .cc-actions .btn-cc:hover { background:#d97706; transform:translateY(-1px); }
  .commission-card .cc-actions .btn-cc.ghost {
    background:transparent; color:#92400e; border:1px solid #fcd34d;
  }
  .commission-card .cc-actions .btn-cc.ghost:hover { background:rgba(252,211,77,.3); }
  .commission-card .cc-actions .btn-cc.danger { background:#ef4444; }
  .commission-card .cc-actions .btn-cc.danger:hover { background:#dc2626; }
  .commission-card .cc-edit { margin-top:10px; display:none; gap:8px; flex-wrap:wrap; }
  .commission-card .cc-edit.open { display:flex; }
  .commission-card .cc-edit input[type=number] {
    flex:1; min-width:160px; padding:8px 10px; border-radius:8px;
    border:1px solid #fcd34d; background:#fff; font-size:14px; font-weight:600;
  }
  .commission-card .cc-edit input[type=text] {
    flex:2; min-width:200px; padding:8px 10px; border-radius:8px;
    border:1px solid #fcd34d; background:#fff; font-size:13px;
  }

  /* Phan nhan vien (staff commission) ben trong commission-card */
  .cc-divider {
    margin:14px 0 10px; border:none; border-top:1px dashed rgba(180,83,9,.25);
  }
  .cc-staff-head {
    display:flex; align-items:center; gap:8px; margin-bottom:8px;
    font-weight:700; color:#92400e; font-size:14px;
  }
  .cc-staff-list { display:flex; flex-direction:column; gap:6px; }
  .cc-staff-row {
    display:flex; align-items:center; gap:8px; padding:8px 10px;
    background:rgba(255,255,255,.6); border-radius:8px; border:1px solid rgba(252,211,77,.5);
    flex-wrap:wrap;
  }
  .cc-staff-row .name { flex:1; font-weight:600; font-size:13px; color:#7c2d12; min-width:120px; }
  .cc-staff-row .amt  { font-size:15px; font-weight:800; color:#b45309; }
  .cc-staff-row .meta { font-size:11.5px; color:#9a3412; width:100%; }
  .cc-staff-row .row-actions { display:flex; gap:4px; margin-left:auto; }
  .cc-staff-row .row-actions button {
    background:transparent; border:1px solid rgba(252,211,77,.6); border-radius:6px;
    padding:3px 8px; cursor:pointer; font-size:12px; color:#92400e;
    transition:all .12s;
  }
  .cc-staff-row .row-actions button:hover { background:rgba(252,211,77,.35); }
  .cc-staff-row .row-actions button.danger { border-color:#fca5a5; color:#dc2626; }
  .cc-staff-row .row-actions button.danger:hover { background:#fee2e2; }
  .cc-add-staff-form {
    display:none; flex-direction:column; gap:8px; margin-top:8px;
    background:rgba(255,255,255,.55); border-radius:10px; padding:10px;
    border:1px dashed #fcd34d;
  }
  .cc-add-staff-form.open { display:flex; }
  .cc-add-staff-form input {
    padding:7px 10px; border-radius:8px; border:1px solid #fcd34d;
    background:#fff; font-size:13px; width:100%; box-sizing:border-box;
  }
  .cc-add-staff-form .form-row { display:flex; gap:8px; flex-wrap:wrap; }
  .cc-add-staff-form .form-row input[type=number] { flex:1; min-width:130px; }

  /* Staff picker tuy chinh */
  .cc-staff-picker { position:relative; flex:1; min-width:160px; }
  .cc-staff-picker-btn {
    display:flex; align-items:center; gap:8px; width:100%; padding:7px 10px;
    border-radius:8px; border:1px solid #fcd34d; background:#fff; cursor:pointer;
    font-size:13px; text-align:left; box-sizing:border-box;
  }
  .cc-staff-picker-btn:hover { border-color:#f59e0b; background:#fffbeb; }
  .cc-staff-picker-btn .sp-avatar {
    width:28px; height:28px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:700; font-size:12px; color:#fff; flex-shrink:0;
  }
  .cc-staff-picker-btn .sp-name { flex:1; font-weight:600; color:#7c2d12; }
  .cc-staff-picker-btn .sp-placeholder { flex:1; color:#b45309; font-style:italic; }
  .cc-staff-picker-btn .sp-role-pill {
    font-size:10px; font-weight:700; padding:2px 6px; border-radius:999px;
  }
  .cc-staff-picker-btn .sp-role-pill.staff { background:#dbeafe; color:#1d4ed8; }
  .cc-staff-picker-btn .sp-role-pill.kithuat { background:#dcfce7; color:#15803d; }
  .cc-staff-picker-btn .sp-caret { color:#b45309; font-size:10px; }
  .cc-staff-picker-panel {
    display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:#fff; border:1px solid #fcd34d; border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,.12); z-index:9999; max-height:260px;
    overflow-y:auto;
  }
  .cc-staff-picker-panel.open { display:block; }
  .cc-staff-picker-panel .sp-group-label {
    padding:6px 12px 3px; font-size:10.5px; font-weight:700; color:#9a3412;
    text-transform:uppercase; letter-spacing:.5px; background:#fff8f1;
    border-bottom:1px solid #fef3c7; position:sticky; top:0;
  }
  .cc-staff-picker-panel .sp-item {
    display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer;
    transition:background .1s;
  }
  .cc-staff-picker-panel .sp-item:hover { background:#fffbeb; }
  .cc-staff-picker-panel .sp-item.selected { background:#fef3c7; }
  .cc-staff-picker-panel .sp-item .sp-avatar {
    width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0;
  }
  .cc-staff-picker-panel .sp-item .sp-info { flex:1; min-width:0; }
  .cc-staff-picker-panel .sp-item .sp-info .sp-iname {
    font-weight:600; font-size:13px; color:#7c2d12;
  }
  .cc-staff-picker-panel .sp-item .sp-info .sp-iphone {
    font-size:11.5px; color:#9a3412; margin-top:1px;
  }
  .cc-staff-picker-panel .sp-item .sp-role-pill {
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; flex-shrink:0;
  }
  .cc-staff-picker-panel .sp-item .sp-role-pill.staff { background:#dbeafe; color:#1d4ed8; }
  .cc-staff-picker-panel .sp-item .sp-role-pill.kithuat { background:#dcfce7; color:#15803d; }

  /* Date range button + popover */
  .date-range-btn {
    display:flex; align-items:center; width:100%; height:32px; padding:5px 10px;
    background:#f1f5f9; border:1px solid transparent; border-radius:6px;
    font-size:12.5px; color:#0f172a; cursor:pointer; text-align:left;
    transition: all .2s ease; box-sizing:border-box;
  }
  .date-range-btn:hover { background:#e2e8f0; }
  .date-range-btn.active { background:#fff; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); color:var(--primary); font-weight:600; }
  .date-range-pop {
    position:absolute; top:calc(100% + 4px); left:0; z-index:30;
    background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 32px rgba(15,23,42,.15); padding:12px; min-width:240px;
  }

  /* Bill column colors */
  .amt-total  { color:#0f172a; font-weight:600; }
  .amt-paid   { color:#16a34a; font-weight:500; }
  .amt-paid-zero { color:#94a3b8; }
  .amt-remain { color:#dc2626; font-weight:600; }
  /* multi-select chung */
  .ms-btn { width:100%; height:32px; background:#f1f5f9; border:1px solid transparent; border-radius:6px; padding:0 8px; font-size:12.5px; color:#0f172a; text-align:left; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ms-pop { position:absolute; top:calc(100% + 4px); right:0; z-index:200; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.12); padding:4px 0; min-width:160px; width:max-content; }
  /* multi-select thanh toan */
  .ps-opt { display:flex; align-items:center; gap:8px; padding:6px 14px; cursor:pointer; font-size:13px; user-select:none; white-space:nowrap; color:#0f172a; }
  .ps-opt:hover { background:#f8fafc; }
  .ps-opt input[type=checkbox] { position:absolute; opacity:0; width:0; height:0; }
  .ps-box { flex-shrink:0; width:15px; height:15px; border:1.5px solid #cbd5e1; border-radius:4px; background:#fff; display:inline-flex; align-items:center; justify-content:center; transition:background .12s, border-color .12s; }
  .ps-opt input:checked ~ .ps-box { background:#2563eb; border-color:#2563eb; }
  .ps-opt input:checked ~ .ps-box::after { content:''; display:block; width:4px; height:7px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); }

  /* ===== BULK SELECT ===== */
  .row-cb { width:18px; height:18px; accent-color:#2563eb; cursor:pointer; }
  .bulk-bar {
    display:none; align-items:center; gap:12px; flex-wrap:wrap;
    background:linear-gradient(135deg,#1e40af,#2563eb); color:#fff;
    padding:10px 16px; border-radius:12px; margin-bottom:14px;
    box-shadow:0 4px 16px rgba(37,99,235,.35); animation:slideDown .2s ease;
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
  .bulk-bar.visible { display:flex; }
  .bulk-bar .bb-info { font-weight:700; font-size:14px; }
  .bulk-bar .bb-sub  { font-size:12px; opacity:.85; }
  .bulk-bar .bb-sep  { width:1px; height:24px; background:rgba(255,255,255,.3); }
  .bulk-bar .btn-pr {
    background:#fff; color:#1e40af; border:none; border-radius:8px;
    padding:8px 16px; font-weight:700; font-size:13px; cursor:pointer;
    transition:all .15s ease; display:flex; align-items:center; gap:6px;
  }
  .bulk-bar .btn-pr:hover:not(:disabled) { background:#dbeafe; transform:translateY(-1px); }
  .bulk-bar .btn-pr:disabled { opacity:.5; cursor:not-allowed; }
  .bulk-bar .btn-clear {
    background:transparent; border:1px solid rgba(255,255,255,.4); color:#fff;
    border-radius:8px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600;
  }
  .bulk-bar .btn-clear:hover { background:rgba(255,255,255,.15); }
  th.cb-col, td.cb-col { width:36px; text-align:center; padding:8px 6px !important; }

  /* Modal PYC */
  .pyc-modal { padding:20px; }
  .pyc-summary { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px 16px; margin-bottom:14px; }
  .pyc-summary .row { display:flex; justify-content:space-between; padding:4px 0; font-size:13.5px; color:#334155; }
  .pyc-summary .row b { color:#0f172a; }
  .pyc-summary .row.total { border-top:1px dashed #cbd5e1; margin-top:6px; padding-top:8px; font-size:15px; font-weight:700; color:#dc2626; }
  .pyc-order-list { max-height:200px; overflow-y:auto; border:1px solid #e2e8f0; border-radius:8px; margin-bottom:14px; }
  .pyc-order-list .orow { display:flex; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #f1f5f9; font-size:13px; align-items:center; }
  .pyc-order-list .orow:last-child { border-bottom:none; }
  .pyc-order-list .orow .ocode { font-weight:700; color:#2563eb; }
  .pyc-order-list .orow .oamt  { color:#dc2626; font-weight:600; }
  .pyc-ob-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; margin-bottom:14px; }
  .pyc-ob-row label { font-size:13.5px; color:#78350f; font-weight:500; cursor:pointer; flex:1; }
  .pyc-err { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px 14px; color:#b91c1c; font-size:13.5px; font-weight:600; display:none; margin-bottom:10px; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav"><h2 class="topnav-title">Đơn hàng</h2></div>
    <div class="content flex-page">
      <div class="toolbar">
        <a href="/admin/new-order.html" class="btn sm">+ Tạo đơn</a>
        <button type="button" class="btn ghost sm" id="btnOpenStatement" style="margin-left:8px">📋 Xuất bảng kê</button>
        <select data-filter="collected_for_dealer" class="select" style="margin-left:auto;max-width:200px">
          <option value="">Tất cả đơn</option>
          <option value="1">Chỉ đơn thu hộ đại lí</option>
          <option value="0">Bỏ đơn thu hộ đại lí</option>
        </select>
      </div>

      <!-- Bulk action bar -->
      <div id="bulkBar" class="bulk-bar">
        <div>
          <div class="bb-info">Đã chọn <span id="bbCount">0</span> đơn</div>
          <div class="bb-sub">Khách: <span id="bbCustomer">—</span> · Tổng ước tính: <span id="bbTotal">0đ</span></div>
        </div>
        <div class="bb-sep"></div>
        <button type="button" class="btn-pr" id="btnCreatePR">💳 Tạo yêu cầu thanh toán</button>
        <button type="button" class="btn-clear" id="btnClearSel">✕ Bỏ chọn</button>
      </div>

<div class="table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th class="cb-col"><input type="checkbox" id="cbAll" class="row-cb" title="Chọn tất cả"></th>
              <th style="width:100px">Mã đơn</th>
              <th style="width:140px">Ngày tạo</th>
              <th>Khách</th>
              <th style="width:110px">Loại đơn</th>
              <th style="width:260px">Thông tin</th>
              <th style="width:150px">Tổng tiền</th>
              <th style="width:110px">Trạng thái</th>
              <th style="width:110px">Thanh toán</th>
              <th style="width:70px"></th>
            </tr>
            <tr class="filter-row">
              <th class="cb-col"></th>
              <th><input data-filter="q" placeholder="Mã đơn"></th>
              <th>
                <div class="date-picker-wrap" style="position:relative">
                  <button type="button" id="dateRangeBtn" class="date-range-btn">
                    <span id="dateRangeLabel">Chọn khoảng ngày</span>
                    <span style="margin-left:auto;color:#94a3b8">▾</span>
                  </button>
                  <div id="dateRangePop" class="date-range-pop" style="display:none">
                    <div style="display:flex;flex-direction:column;gap:8px">
                      <label style="font-size:12px;color:#475569">Từ ngày
                        <input type="date" data-filter="date_from" style="width:100%;margin-top:2px">
                      </label>
                      <label style="font-size:12px;color:#475569">Đến ngày
                        <input type="date" data-filter="date_to" style="width:100%;margin-top:2px">
                      </label>
                      <div style="display:flex;gap:6px;justify-content:flex-end">
                        <button type="button" class="btn ghost sm" id="dateRangeClear">Xoá</button>
                        <button type="button" class="btn sm" id="dateRangeClose">Xong</button>
                      </div>
                    </div>
                  </div>
                </div>
              </th>
              <th><input data-filter="customer_q" placeholder="Tên / SĐT khách"></th>
              <th>
                <div style="position:relative">
                  <button type="button" id="tplBtn" class="ms-btn">Tất cả</button>
                  <div id="tplPop" class="ms-pop" style="display:none">
                    <!-- options nạp động bởi JS -->
                    <div style="display:flex;gap:6px;justify-content:flex-end;padding:5px 10px;border-top:1px solid #f1f5f9;margin-top:2px">
                      <button type="button" id="tplClear" class="btn ghost sm">Xoá</button>
                      <button type="button" id="tplApply" class="btn sm">Áp dụng</button>
                    </div>
                  </div>
                </div>
              </th>
              <th><input data-filter="device_q" placeholder="Biển số / TK / SIM"></th>
              <th></th>
              <th>
                <div style="position:relative">
                  <button type="button" id="stBtn" class="ms-btn">Tất cả</button>
                  <div id="stPop" class="ms-pop" style="display:none">
                    <label class="ps-opt"><input type="checkbox" value="pending"><span class="ps-box"></span> Đang chờ</label>
                    <label class="ps-opt"><input type="checkbox" value="confirmed"><span class="ps-box"></span> Lên đơn</label>
                    <label class="ps-opt"><input type="checkbox" value="in_progress"><span class="ps-box"></span> Đang xử lý</label>
                    <label class="ps-opt"><input type="checkbox" value="done"><span class="ps-box"></span> Đã xong</label>
                    <label class="ps-opt"><input type="checkbox" value="cancelled"><span class="ps-box"></span> Đã huỷ</label>
                    <div style="display:flex;gap:6px;justify-content:flex-end;padding:5px 10px;border-top:1px solid #f1f5f9;margin-top:2px">
                      <button type="button" id="stClear" class="btn ghost sm">Xoá</button>
                      <button type="button" id="stApply" class="btn sm">Áp dụng</button>
                    </div>
                  </div>
                </div>
              </th>
              <th>
                <div style="position:relative">
                  <button type="button" id="psBtn" class="ms-btn">Tất cả</button>
                  <div id="psPop" class="ms-pop" style="display:none">
                    <label class="ps-opt"><input type="checkbox" value="unpaid"><span class="ps-box"></span> Chưa trả</label>
                    <label class="ps-opt"><input type="checkbox" value="partial"><span class="ps-box"></span> Một phần</label>
                    <label class="ps-opt"><input type="checkbox" value="paid"><span class="ps-box"></span> Đã trả</label>
                    <label class="ps-opt"><input type="checkbox" value="customer_owes"><span class="ps-box"></span> KH nợ</label>
                    <label class="ps-opt"><input type="checkbox" value="staff_owes"><span class="ps-box"></span> KTV giữ</label>
                    <label class="ps-opt"><input type="checkbox" value="pending_admin_confirm"><span class="ps-box"></span> Chờ xác nhận</label>
                    <div style="display:flex;gap:6px;justify-content:flex-end;padding:5px 10px;border-top:1px solid #f1f5f9;margin-top:2px">
                      <button type="button" id="psClear" class="btn ghost sm">Xoá</button>
                      <button type="button" id="psApply" class="btn sm">Áp dụng</button>
                    </div>
                  </div>
                </div>
              </th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prevPage">« Trước</button>
        <span id="pageInfo">Trang 1</span>
        <button id="nextPage">Sau »</button>
      </div>
    </div>
  </main>
</div>

<!-- Modal chi tiet don -->
<div id="modal" class="modal-bg">
  <div class="modal" style="max-width:1012px">
    <div class="modal-head">
      <h3 id="modalTitle">Chi tiết đơn</h3>
      <button type="button" class="modal-close" id="modalClose" aria-label="Đóng">×</button>
    </div>
    <div class="modal-body od-detail" id="odBody">
      <p style="text-align:center;color:#94a3b8">Đang tải…</p>
    </div>
    <div class="modal-foot od-actions" id="odActions"></div>
  </div>
</div>

<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="/shared/js/imgbb.js"></script>
<script src="/admin/orders.js"></script>
</body>
