<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảng lương KTV – Admin VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
  /* Layout */
  .pr-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .pr-toolbar .grow{flex:1}
  .pr-status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .pr-status.draft{background:#fef3c7;color:#92400e}
  .pr-status.finalized{background:#dcfce7;color:#166534}

  /* Bang luong giong Excel */
  .pr-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
  .pr-table th,.pr-table td{border:1px solid #cbd5e1;padding:6px 8px;vertical-align:middle}
  .pr-table thead th{background:#f1f5f9;font-weight:700;color:#0f172a;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
  .pr-table .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pr-table .center{text-align:center}
  .pr-table tr.row-extra td{background:#f8fafc;color:#475569;font-style:italic}
  .pr-table tr.row-extra td input{font-style:normal}
  .pr-table .col-revenue{background:#fee2e2}
  .pr-table .col-wage{background:#fef3c7}
  .pr-table .col-note{background:#fef9c3}
  .pr-table input.ce{background:transparent;border:0;padding:0 4px;font-size:13px;width:100%;font-family:inherit;color:inherit}
  .pr-table input.ce:focus{outline:1px solid #2563eb;border-radius:3px;background:#fff}
  .pr-table input.ce.num{text-align:right}
  .pr-table .rm-extra{background:transparent;border:0;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
  .pr-table .rm-extra:hover{color:#dc2626}

  /* Hang tong */
  .pr-table tr.row-total td{background:#fef3c7;font-weight:700;font-size:14px;color:#0f172a}
  .pr-table tr.row-extra-add td{background:#f1f5f9}
  .pr-table .add-extra-btn{background:transparent;border:1px dashed #cbd5e1;color:#475569;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12.5px}
  .pr-table .add-extra-btn:hover{background:#fff;border-color:#2563eb;color:#2563eb}

  /* Khoi summary cuoi: Co ban / BHXH / Ung / Con lai */
  .pr-summary{margin-top:14px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;max-width:560px;margin-left:auto;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;background:#fff}
  .pr-summary .lbl,.pr-summary .val{padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:14px}
  .pr-summary .lbl{background:#fef3c7;font-weight:700;color:#92400e}
  .pr-summary .val{text-align:right;font-variant-numeric:tabular-nums}
  .pr-summary .val input{width:100%;text-align:right;border:0;background:transparent;font-size:14px;font-variant-numeric:tabular-nums;font-family:inherit}
  .pr-summary .val input:focus{outline:1px solid #2563eb;background:#fff;border-radius:3px}
  .pr-summary .row-final .lbl{background:#16a34a;color:#fff}
  .pr-summary .row-final .val{background:#dcfce7;font-weight:700;font-size:16px;color:#166534}
  .pr-summary .row-final .lbl,.pr-summary .row-final .val{border-bottom:0}

  .pr-empty{padding:30px;text-align:center;color:#94a3b8;font-style:italic;background:#fff;border:1px dashed #e2e8f0;border-radius:8px}

  /* In an */
  @media print{
    body * { visibility:hidden; }
    #printArea, #printArea * { visibility:visible; }
    #printArea { position:absolute; top:0; left:0; right:0; padding:12px; }
    .no-print { display:none !important; }
    .pr-table .col-revenue{background:#fee2e2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-table .col-wage{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-table .col-note{background:#fef9c3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-table tr.row-total td{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-summary .lbl{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-summary .row-final .lbl{background:#16a34a !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pr-summary .row-final .val{background:#dcfce7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

  .print-head{display:none}
  @media print{ .print-head{display:block;margin-bottom:10px} }
  .print-head h2{margin:0 0 4px;font-size:18px}
  .print-head .sub{font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Bảng lương KTV</h2>
    </div>
    <div class="content">

      <div class="pr-toolbar no-print">
        <div class="field" style="margin:0">
          <label style="font-size:12px;color:#64748b">Kỹ thuật viên</label>
          <select id="selStaff" class="select" style="min-width:240px">
            <option value="">— Chọn KTV —</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label style="font-size:12px;color:#64748b">Tháng</label>
          <input type="month" id="selPeriod" class="input" style="min-width:160px">
        </div>
        <span id="prStatus" class="pr-status draft" style="display:none">Chưa chốt</span>
        <div class="grow"></div>
        <button class="btn ghost" id="btnPrint" disabled>🖨 In</button>
        <button class="btn ghost" id="btnExcel" disabled>⬇ Xuất Excel</button>
        <button class="btn" id="btnFinalize" disabled>✓ Tất toán tháng</button>
        <button class="btn danger" id="btnUnfinalize" style="display:none">↩ Bỏ tất toán</button>
      </div>

      <div id="printArea">
        <div class="print-head">
          <h2>BẢNG LƯƠNG KỸ THUẬT VIÊN</h2>
          <div class="sub" id="printSub"></div>
        </div>

        <div id="prContent">
          <div class="pr-empty">Chọn KTV và tháng để xem bảng lương.</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<!-- SheetJS de xuat Excel client-side -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="/admin/payroll.js"></script>
</body>
</html>
