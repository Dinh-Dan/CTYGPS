<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bảng lương – Admin</title>
<link rel="stylesheet" href="/shared/css/style.css"/>
<style>
/* ---- Tabs ---- */
.pl-tabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:18px}
.pl-tab{padding:9px 22px;font-size:13.5px;font-weight:600;color:#64748b;cursor:pointer;
  border:0;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;transition:.15s}
.pl-tab:hover{color:#0f172a}
.pl-tab.active{color:#2563eb;border-bottom-color:#2563eb}
.pl-panel{display:none}.pl-panel.active{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}

/* ---- Toolbar ---- */
.pl-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:16px}
.pl-bar .grow{flex:1;min-width:0}

/* ---- Back link ---- */
.pl-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:8px;background:#fff;border:1.5px solid #e2e8f0;
  color:#374151;font-size:13px;font-weight:600;text-decoration:none;
  transition:.15s;flex-shrink:0;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pl-back:hover{background:#f1f5f9;color:#111827;border-color:#cbd5e1;
  box-shadow:0 2px 6px rgba(0,0,0,.1);transform:translateX(-1px)}
.pl-back .back-ico{font-size:16px;line-height:1;transition:transform .15s}
.pl-back:hover .back-ico{transform:translateX(-2px)}

/* ---- Staff picker ---- */
.pl-picker-wrap{display:flex;align-items:center;gap:10px;
  background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
  padding:8px 14px 8px 12px;transition:.2s;min-width:250px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pl-picker-wrap:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.pl-picker-wrap .pw-icon{font-size:18px;flex-shrink:0;opacity:.7}
.pl-picker-inner{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.pl-picker-wrap .pw-label{font-size:10.5px;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.5px;line-height:1}
.pl-picker-wrap select{border:0;background:transparent;font-size:13.5px;
  font-weight:600;color:#0f172a;font-family:inherit;width:100%;cursor:pointer;
  outline:none;padding:0;line-height:1.4}

/* ---- Bar divider ---- */
.pl-bar-sep{width:1px;height:32px;background:#e2e8f0;flex-shrink:0}

/* ---- Bảng đơn ---- */
.pl-table-wrap{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:18px}
.pl-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.pl-table th,.pl-table td{
  border-bottom:1px solid #e8edf3;border-right:1px solid #e8edf3;
  padding:8px 10px;vertical-align:middle}
.pl-table th:last-child,.pl-table td:last-child{border-right:0}
.pl-table thead th{
  background:#f1f5f9;font-weight:700;color:#475569;font-size:11px;
  text-transform:uppercase;letter-spacing:.5px;
  position:sticky;top:0;z-index:1;border-bottom:2px solid #cbd5e1}
.pl-table .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pl-table tbody tr:hover td{background:#f8fafc}
.pl-table .link{color:#2563eb;font-weight:700;text-decoration:none;border-bottom:1px dashed #bfdbfe}
.pl-table .link:hover{color:#1d4ed8;border-bottom-style:solid}

/* ---- Summary block ---- */
.pl-calc{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;margin-bottom:20px}
.pl-sum{min-width:280px;max-width:380px;border:1px solid #e2e8f0;border-radius:10px;
  overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);flex-shrink:0}
.pl-sum .row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f1f5f9}
.pl-sum .row:last-child{border-bottom:0}
.pl-sum .lbl{padding:10px 14px;background:#fffbeb;font-weight:600;color:#92400e;
  font-size:13px;border-right:1px solid #fde68a}
.pl-sum .val{padding:10px 14px;text-align:right;font-variant-numeric:tabular-nums;font-size:13.5px}
.pl-sum .val input{width:100%;text-align:right;border:0;background:transparent;
  font-size:13.5px;font-family:inherit;font-variant-numeric:tabular-nums;color:#0f172a}
.pl-sum .val input:focus{outline:1px solid #2563eb;background:#eff6ff;border-radius:3px}
.pl-sum .row.total .lbl{background:#16a34a;color:#fff;border-right-color:transparent}
.pl-sum .row.total .val{background:#dcfce7;font-weight:700;font-size:18px;color:#166534}
.pl-sum .row.debt .lbl{background:#fef2f2;color:#991b1b;border-right-color:#fecaca}
.pl-sum .row.debt .val{color:#dc2626;font-weight:700}

/* ---- Extras/deductions editor (compact) ---- */
.pl-extra-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.pl-extra-row input{border:1px solid #e2e8f0;border-radius:5px;padding:4px 6px;
  font-size:12px;font-family:inherit}
.pl-extra-row .lbl-in{flex:1}
.pl-extra-row .amt-in{width:90px;text-align:right}
.pl-extra-row button{background:transparent;border:0;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1;padding:1px 3px}
.pl-extra-row button:hover{color:#dc2626}

/* ---- Compact extras block ---- */
.extras-compact{margin-bottom:10px}
.ec-section{margin-bottom:8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px}
.ec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ec-head span{font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.ec-head button{background:transparent;border:1px dashed #cbd5e1;color:#64748b;
  padding:1px 8px;border-radius:4px;cursor:pointer;font-size:11px;transition:.15s;line-height:1.6}
.ec-head button:hover{border-color:#2563eb;color:#2563eb;border-style:solid}

/* ---- Summary card compact ---- */
.pl-sum.sm .sum-col-title{padding:6px 10px;font-size:10px}
.pl-sum.sm .row .lbl{padding:6px 10px;font-size:12px}
.pl-sum.sm .row .val{padding:6px 10px;font-size:12.5px}
.pl-sum.sm .row .val input{font-size:12.5px}
.pl-sum.sm .row.total .val{font-size:15px}
.pl-sum.sm .row.total .lbl{font-size:13px}

/* ---- Right col: flex column, finalize ghim đáy ---- */
.draft-grid > div:last-child{overflow-y:auto;display:flex;flex-direction:column}
.finalize-bar{margin-top:auto;padding-top:12px;border-top:1px solid #e2e8f0;flex-shrink:0}

/* ---- Trạng thái phiếu ---- */
.slip-pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.slip-pill.paid  {background:#dcfce7;color:#166534}
.slip-pill.debt  {background:#fef3c7;color:#92400e}
.slip-pill.unpaid{background:#fee2e2;color:#991b1b}

/* ---- Danh sách phiếu ---- */
.slip-list{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff}
.slip-row{display:grid;grid-template-columns:180px 1fr 120px 120px 120px 100px 100px;
  gap:10px;align-items:center;padding:12px 16px;
  border-bottom:1px solid #f1f5f9;font-size:13px}
.slip-row:last-child{border-bottom:0}
.slip-row:hover{background:#f8fafc}
.slip-row.head{background:#f1f5f9;font-weight:700;color:#475569;font-size:11px;
  text-transform:uppercase;letter-spacing:.4px}
.slip-row .num{text-align:right;font-variant-numeric:tabular-nums}
.slip-row .period{font-weight:700;color:#0f172a;line-height:1.5}
.slip-row .meta{color:#64748b;font-size:11.5px}

/* ---- Ghi chú kỳ ---- */
.pr-date-info{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:#475569}
.pr-date-info strong{color:#0f172a}
.pr-date-edit{display:flex;gap:6px;align-items:center;background:#fff;
  border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px}
.pr-date-edit label{font-size:11.5px;color:#64748b;font-weight:600;white-space:nowrap}
.pr-date-edit input[type=date]{border:0;background:transparent;font-size:13px;padding:0;
  font-family:inherit;color:#0f172a;cursor:pointer}
.pr-date-edit input[type=date]:focus{outline:none;color:#2563eb}

/* ---- Ung luong ---- */
.adv-list{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fff;margin-bottom:10px}
.adv-row{display:flex;gap:10px;align-items:center;padding:9px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
.adv-row:last-child{border-bottom:0}
.adv-row .adv-amt{font-weight:700;color:#b45309;min-width:110px;text-align:right}
.adv-row .adv-note{flex:1;color:#64748b;font-size:12px}
.adv-row .adv-date{color:#94a3b8;font-size:11.5px;white-space:nowrap}
.adv-section{margin-bottom:18px}
.adv-section h4{margin:0 0 8px;font-size:12px;font-weight:700;color:#92400e;
  text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:8px}

/* ---- Empty / loading ---- */
.pl-empty{padding:40px;text-align:center;color:#94a3b8;font-style:italic;
  background:#fff;border:1px dashed #e2e8f0;border-radius:8px;font-size:13px}

/* ---- Control row (kỳ + filter + ứng lương) ---- */
.draft-ctrl-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:14px;background:#f8fafc;border:1px solid #e2e8f0;
  border-radius:10px;padding:10px 14px}
.filter-in-main{flex:1;min-width:160px;border:1px solid #e2e8f0;border-radius:8px;
  padding:7px 12px;font-size:13px;font-family:inherit;background:#fff}
.filter-in-main:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-advance-main{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
  border:0;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(217,119,6,.3);
  transition:.15s;flex-shrink:0}
.btn-advance-main:hover{background:linear-gradient(135deg,#d97706,#b45309);
  transform:translateY(-1px);box-shadow:0 3px 12px rgba(217,119,6,.4)}

/* ---- Full-height lock: chỉ bảng cuộn, không cuộn page ---- */
.main .content{overflow:hidden;display:flex;flex-direction:column}
.pl-tabs{flex-shrink:0}
#draftArea{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
#slipListArea{flex:1;min-height:0;overflow-y:auto}
.draft-ctrl-row{flex-shrink:0}

/* ---- Draft 7-3 grid ---- */
.draft-grid{display:grid;grid-template-columns:7fr 3fr;gap:16px;
  flex:1;min-height:0;overflow:hidden;align-items:stretch}
.draft-grid > div{min-height:0}
.draft-grid > div:first-child{display:flex;flex-direction:column;overflow:hidden}
.draft-grid > div:first-child .pl-table-wrap{flex:1;overflow:auto;min-height:0}
.pl-table tfoot{position:sticky;bottom:0;z-index:2}
.pl-table tfoot tr td{border-top:2px solid #cbd5e1}
.draft-grid > div:last-child{overflow-y:auto;display:flex;flex-direction:column}
.finalize-bar{margin-top:auto;padding-top:12px;border-top:1px solid #e2e8f0;flex-shrink:0}
@media(max-width:900px){.draft-grid{grid-template-columns:1fr}}

/* ---- Advance rows ---- */
.pl-table tr.row-adv td{background:#fffbeb}
.pl-table tr.row-adv:hover td{background:#fef3c7}

/* ---- Sum col title ---- */
.sum-col-title{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;
  letter-spacing:.5px;padding:9px 14px;background:#f1f5f9;border-bottom:1px solid #e2e8f0;
  border-radius:10px 10px 0 0}

/* ---- Slip detail modal ---- */
.slip-detail-table{width:100%;border-collapse:collapse;font-size:12.5px}
.slip-detail-table th,.slip-detail-table td{
  padding:7px 10px;border-bottom:1px solid #f1f5f9;text-align:left;vertical-align:middle}
.slip-detail-table th{background:#f8fafc;font-weight:600;color:#64748b;font-size:11px}
.slip-detail-table .num{text-align:right;font-variant-numeric:tabular-nums}

@media(max-width:860px){
  .slip-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto}
  .slip-row.head{display:none}
  .pl-calc{flex-direction:column}
  .pl-sum{max-width:100%}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 id="pageTitle" style="font-size:17px;font-weight:700;margin:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:80px">Bảng lương</h2>
      <div style="flex:1"></div>
      <div class="pl-picker-wrap" style="min-width:210px;max-width:260px;margin:0">
        <span class="pw-icon">👤</span>
        <div class="pl-picker-inner">
          <span class="pw-label">Nhân viên</span>
          <select id="selStaff">
            <option value="">— Chọn nhân viên —</option>
          </select>
        </div>
      </div>
      <a href="/admin/staff.html" class="pl-back" style="margin-left:10px;flex-shrink:0">
        <span class="back-ico">←</span>
        <span>DS Nhân viên</span>
      </a>
    </div>
    <div class="content">

      <!-- Tabs -->
      <div class="pl-tabs" id="plTabs" style="display:none">
        <button class="pl-tab active" data-tab="tinh">📋 Tính lương</button>
        <button class="pl-tab" data-tab="phieu">🗂 Phiếu lương</button>
      </div>

      <!-- Tab: Tính lương -->
      <div class="pl-panel active" id="panelTinh">
        <div id="draftArea">
          <div class="pl-empty">Chọn nhân viên để bắt đầu tính lương.</div>
        </div>
      </div>

      <!-- Tab: Phiếu lương -->
      <div class="pl-panel" id="panelPhieu">
        <div id="slipListArea">
          <div class="pl-empty">Chọn nhân viên để xem phiếu lương.</div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Modal: Tạo ứng lương -->
<div id="modalAdvance" class="modal-bg">
  <div class="modal" style="max-width:400px">
    <div class="modal-head">
      <h3>Tạo phiếu ứng lương</h3>
      <button class="modal-close" id="modalAdvClose">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Số tiền ứng *</label>
        <input type="text" id="advAmt" class="input" placeholder="0"
               style="text-align:right;font-size:16px;font-weight:700" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <input type="text" id="advNote" class="input" placeholder="VD: ứng 20/5, tiền mặt..."/>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="modalAdvCancel">Huỷ</button>
      <button class="btn primary" id="modalAdvSave">Tạo phiếu ứng</button>
    </div>
  </div>
</div>

<!-- Modal: Phát lương -->
<div id="modalPay" class="modal-bg">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <h3>Phát lương</h3>
      <button class="modal-close" id="modalPayClose">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#475569;margin-bottom:14px" id="paySubtitle"></p>
      <div class="field">
        <label>Số tiền thực trả *</label>
        <input type="text" id="payAmt" class="input" placeholder="0"
               style="text-align:right;font-size:16px;font-weight:700" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <input type="text" id="payNote" class="input" placeholder="VD: chuyển khoản, tiền mặt..."/>
      </div>
      <div id="payDebtNote" style="display:none;background:#fef3c7;border:1px solid #fde68a;
        border-radius:8px;padding:10px 14px;font-size:13px;color:#92400e;margin-top:10px"></div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="modalPayCancel">Huỷ</button>
      <button class="btn primary" id="modalPaySave">Xác nhận phát lương</button>
    </div>
  </div>
</div>

<!-- Modal: Xem chi tiết phiếu -->
<div id="modalSlip" class="modal-bg">
  <div class="modal" style="max-width:780px">
    <div class="modal-head">
      <h3 id="slipDetailTitle">Chi tiết phiếu lương</h3>
      <button class="modal-close" id="modalSlipClose">×</button>
    </div>
    <div class="modal-body" id="slipDetailBody" style="padding:0 20px 16px"></div>
    <div class="modal-foot" id="slipDetailFoot">
      <button class="btn ghost" id="modalSlipClose2">Đóng</button>
      <button class="btn ghost" id="btnShareSlip" style="display:none">🔗 Chia sẻ / In</button>
      <button class="btn danger" id="btnDeleteSlip" style="display:none">Xóa phiếu</button>
      <button class="btn primary" id="btnPaySlip" style="display:none">💸 Phát lương</button>
    </div>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="/shared/js/order-quick-view.js"></script>
<script src="/admin/payroll.js"></script>
</body>
</html>
