<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảng lương Nhân viên – Admin VinaGPS</title>
<link rel="stylesheet" href="/shared/css/style.css" />
<style>
/* ===== Toolbar ===== */
.pr-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.pr-toolbar .grow{flex:1}
.pr-status{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
.pr-status.draft{background:#fef3c7;color:#92400e}
.pr-status.finalized{background:#dcfce7;color:#166534}

/* ===== Tabs ===== */
.pr-tabs{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:16px}
.pr-tab{padding:8px 20px;font-size:13.5px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:0;border-left:0;border-right:0;transition:.15s;white-space:nowrap}
.pr-tab:hover{color:#0f172a}
.pr-tab.active{color:#2563eb;border-bottom-color:#2563eb}
.pr-tab .tab-badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;margin-left:5px;vertical-align:middle}

/* ===== Tab panels ===== */
.pr-panel{display:none}
.pr-panel.active{display:block}

/* ===== Bang luong ===== */
.pr-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.pr-table th,.pr-table td{border:1px solid #cbd5e1;padding:6px 8px;vertical-align:middle}
.pr-table thead th{background:#f1f5f9;font-weight:700;color:#0f172a;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.pr-table .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pr-table .center{text-align:center}
.pr-table tr.row-extra td{background:#f8fafc;color:#475569}
.pr-table .col-revenue{background:#fee2e2}
.pr-table .col-wage{background:#fef3c7}
.pr-table .col-note{background:#fef9c3}
.pr-table input.ce{background:transparent;border:0;padding:0 4px;font-size:13px;width:100%;font-family:inherit;color:inherit}
.pr-table input.ce:focus{outline:1px solid #2563eb;border-radius:3px;background:#fff}
.pr-table input.ce.num{text-align:right}
.pr-table .rm-extra{background:transparent;border:0;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
.pr-table .rm-extra:hover{color:#dc2626}
.pr-table tr.row-total td{background:#fef3c7;font-weight:700;font-size:14px;color:#0f172a}
.pr-table tr.row-extra-add td{background:#f1f5f9}
.pr-table .add-extra-btn{background:transparent;border:1px dashed #cbd5e1;color:#475569;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:12.5px}
.pr-table .add-extra-btn:hover{background:#fff;border-color:#2563eb;color:#2563eb}
.pr-order-link{color:#0f172a;font-weight:600;text-decoration:none}
.pr-order-link:hover{color:#2563eb;text-decoration:underline}
.pr-code-link{color:#94a3b8;font-size:11px;text-decoration:none;margin-left:2px}
.pr-code-link:hover{color:#2563eb}
.pr-badge-commission{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#ede9fe;color:#6d28d9;vertical-align:middle;margin-left:4px}

/* ===== Summary cuoi tab bang luong ===== */
.pr-summary-row{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;align-items:flex-start}
.pr-summary{min-width:260px;max-width:340px;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;background:#fff}
.pr-summary .s-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #e2e8f0}
.pr-summary .s-row:last-child{border-bottom:0}
.pr-summary .lbl{padding:9px 12px;background:#fef3c7;font-weight:700;color:#92400e;font-size:13.5px}
.pr-summary .val{padding:9px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:13.5px}
.pr-summary .val input{width:100%;text-align:right;border:0;background:transparent;font-size:13.5px;font-family:inherit;font-variant-numeric:tabular-nums}
.pr-summary .val input:focus{outline:1px solid #2563eb;background:#fff;border-radius:3px}
.pr-summary .s-row.final .lbl{background:#16a34a;color:#fff}
.pr-summary .s-row.final .val{background:#dcfce7;font-weight:700;font-size:16px;color:#166534}
.pr-note-block{flex:1;min-width:220px}
.pr-note-block label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px}

/* ===== Tab Ung truoc ===== */
.adv-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.adv-topbar h3{margin:0;font-size:15px;font-weight:700;color:#0f172a}
.adv-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.adv-table th,.adv-table td{padding:9px 14px;text-align:left;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.adv-table th{background:#f8fafc;font-size:11.5px;font-weight:600;text-transform:uppercase;color:#64748b;letter-spacing:.3px}
.adv-table tbody tr:last-child td{border-bottom:0}
.adv-table .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:#1d4ed8}
.adv-table .rm-adv{background:transparent;border:0;color:#94a3b8;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.adv-table .rm-adv:hover{color:#dc2626}
.adv-total-row{display:flex;justify-content:flex-end;margin-top:10px;font-size:14px;font-weight:700;color:#1d4ed8;font-variant-numeric:tabular-nums}
.adv-empty{text-align:center;color:#94a3b8;font-style:italic;padding:30px;background:#fff;border:1px dashed #e2e8f0;border-radius:8px;font-size:13px}

/* ===== Tab Lich su ky ===== */
.hist-list{display:flex;flex-direction:column;gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fff}
.hist-row{display:grid;grid-template-columns:90px 1fr auto 120px;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:13px}
.hist-row:last-child{border-bottom:0}
.hist-row.voided{opacity:.55;background:#fafafa}
.hist-row .period{font-weight:700;color:#0f172a;font-size:14px}
.hist-row .meta{color:#64748b;font-size:12px;line-height:1.5}
.hist-row .amt{font-variant-numeric:tabular-nums;font-weight:700;color:#166534;text-align:right;font-size:14px}
.hist-row .amt.neg{color:#dc2626}
.hist-row .status{text-align:right}
.pill.hist-ok{background:#dcfce7;color:#166534;font-size:11px}
.pill.hist-void{background:#fee2e2;color:#991b1b;font-size:11px}
.hist-load-btn{margin-top:12px;text-align:center}
.hist-empty{text-align:center;color:#94a3b8;font-style:italic;padding:40px;font-size:13px;border:1px dashed #e2e8f0;border-radius:8px}

/* ===== Empty state ===== */
.pr-empty{padding:50px 20px;text-align:center;color:#94a3b8;font-style:italic;background:#fff;border:1px dashed #e2e8f0;border-radius:8px;font-size:13px}

/* ===== In an ===== */
@media print{
  body * { visibility:hidden; }
  #printArea, #printArea * { visibility:visible; }
  #printArea { position:absolute; top:0; left:0; right:0; padding:16px; }
  .no-print { display:none !important; }
  .pr-table .col-revenue{background:#fee2e2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-table .col-wage{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-table .col-note{background:#fef9c3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-table tr.row-total td{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-summary .lbl{background:#fef3c7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-summary .s-row.final .lbl{background:#16a34a !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-summary .s-row.final .val{background:#dcfce7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-tabs,.pr-toolbar{display:none!important}
  #panelBangLuong{display:block!important}
}
.print-head{display:none}
@media print{ .print-head{display:block;margin-bottom:12px} }
.print-head h2{margin:0 0 4px;font-size:18px}
.print-head .sub{font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topnav">
      <h2 class="topnav-title">Bảng lương Nhân viên</h2>
    </div>
    <div class="content">

      <!-- Toolbar -->
      <div class="pr-toolbar no-print">
        <a href="/admin/staff.html" class="btn ghost" style="flex-shrink:0">← Nhân viên</a>
        <div class="field" style="margin:0">
          <label style="font-size:12px;color:#64748b">Nhân viên</label>
          <select id="selStaff" class="select" style="min-width:200px">
            <option value="">— Chọn nhân viên —</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label style="font-size:12px;color:#64748b">Tháng</label>
          <input type="month" id="selPeriod" class="input" style="min-width:150px">
        </div>
        <span id="prStatus" class="pr-status" style="display:none"></span>
        <div class="grow"></div>
        <button class="btn ghost no-print" id="btnPrint" disabled>🖨 In</button>
        <button class="btn ghost no-print" id="btnExcel" disabled>⬇ Excel</button>
        <button class="btn primary" id="btnFinalize" disabled>✓ Tất toán tháng</button>
        <button class="btn danger" id="btnUnfinalize" style="display:none">↩ Bỏ tất toán</button>
      </div>

      <!-- Tabs -->
      <div class="pr-tabs no-print" id="prTabs" style="display:none">
        <button class="pr-tab active" data-tab="bangluong">📋 Bảng lương</button>
        <button class="pr-tab" data-tab="ungtuoc">💰 Ứng trước <span class="tab-badge" id="tabBadgeAdv" style="display:none"></span></button>
        <button class="pr-tab" data-tab="lichsu">🕓 Lịch sử kỳ</button>
      </div>

      <!-- ======== Panel: Bang luong ======== -->
      <div id="panelBangLuong" class="pr-panel active">
        <div id="printArea">
          <div class="print-head">
            <h2>BẢNG LƯƠNG NHÂN VIÊN</h2>
            <div class="sub" id="printSub"></div>
          </div>
          <div id="prTableWrap">
            <div class="pr-empty">Chọn nhân viên và tháng để xem bảng lương.</div>
          </div>
        </div>
      </div>

      <!-- ======== Panel: Ung truoc ======== -->
      <div id="panelUngTruoc" class="pr-panel">
        <div id="prAdvContent">
          <div class="pr-empty">Chọn nhân viên và tháng để xem phiếu ứng trước.</div>
        </div>
      </div>

      <!-- ======== Panel: Lich su ky ======== -->
      <div id="panelLichSu" class="pr-panel">
        <div id="prHistContent">
          <div class="pr-empty">Chọn nhân viên để xem lịch sử tất toán.</div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ===== Modal: Them phieu ung ===== -->
<div id="modalAdv" class="modal-bg">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <h3>Thêm phiếu ứng trước</h3>
      <button type="button" class="modal-close" id="modalAdvClose">×</button>
    </div>
    <div class="modal-body">
      <p class="text-muted" id="modalAdvSub" style="margin-bottom:12px;font-size:13px"></p>
      <div class="field">
        <label>Số tiền ứng *</label>
        <input type="text" id="advAmt" class="input" placeholder="0" style="text-align:right;font-size:16px;font-weight:600">
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <input type="text" id="advNote" class="input" placeholder="VD: tạm ứng lần 1">
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn ghost" id="modalAdvCancel">Huỷ</button>
      <button type="button" class="btn primary" id="modalAdvSave">Lưu phiếu ứng</button>
    </div>
  </div>
</div>

<script src="/shared/js/ui.js"></script>
<script src="/shared/js/api.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/shared/js/admin-shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="/admin/payroll.js"></script>
</body>
</html>
